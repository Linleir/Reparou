<!-- JS -->
<script src="dados.js"></script>

<!-- JS ORIGINAL (INALTERADO) -->
<script>
const listaFavoritos = document.getElementById('listaFavoritos');
const campoPesquisaFavoritos = document.getElementById('campoPesquisaFavoritos');

function lojaCombinaPesquisaFavoritos(loja, textoDigitado = '') {
    const busca = normalizarTexto(textoDigitado || '');
    if (!busca) return true;
    const base = normalizarTexto(obterTermosFiltroDaLoja(loja).join(' | '));
    const termos = obterTermosPesquisa(textoDigitado || '');
    return base.includes(busca) || termos.every((termo) => base.includes(termo));
}

function renderizarFavoritos() {
    const favoritas = obterLojasFavoritasDetalhadas();
    const termo = (campoPesquisaFavoritos?.value || '').trim();

    if (!favoritas.length) {
        listaFavoritos.innerHTML = '<div class="text-center text-muted p-3">Você ainda não favoritou nenhuma loja.</div>';
        return;
    }

    const favoritasFiltradas = favoritas.filter((loja) => lojaCombinaPesquisaFavoritos(loja, termo));

    if (!favoritasFiltradas.length) {
        listaFavoritos.innerHTML = '<div class="text-center text-muted p-3">Nenhuma loja favorita encontrada.</div>';
        return;
    }

    listaFavoritos.innerHTML = favoritasFiltradas.map((loja) => criarCardLojaHtml(loja, 'favoritos')).join('');
    conectarFavoritosNoEscopo(listaFavoritos);
}

if (campoPesquisaFavoritos) {
    campoPesquisaFavoritos.addEventListener('input', renderizarFavoritos);
}

document.addEventListener('favoritosAtualizados', renderizarFavoritos);
renderizarFavoritos();
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
