<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Loja</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="mobile-container">

    <!-- HEADER -->
    <div class="black-header">

        <a id="voltar-loja-link" href="perfil_lojista.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <div class="profile-center">
            <img src="imgtst.jpg" class="profile2-img" alt="Editar loja">
            <h2 id="titulo-pagina-loja">Editar Loja</h2>
        </div>

    </div>

    <!-- CONTEÚDO -->
    <div class="content-area">

        <div class="white-window">

            <form class="form-container" id="form-editar-loja">
                <label for="editar-nome-loja"><strong>Nome da loja</strong></label>
                <input type="text" id="editar-nome-loja" class="search-input2" placeholder="Nome da loja">

                <label for="editar-endereco-loja"><strong>Endereço</strong></label>
                <input type="text" id="editar-endereco-loja" class="search-input2" placeholder="Endereço">

                <label for="editar-telefone-loja"><strong>Telefone</strong></label>
                <input type="text" id="editar-telefone-loja" class="search-input2" placeholder="Telefone">

                <label for="editar-categoria-loja"><strong>Categoria</strong></label>
                <input type="text" id="editar-categoria-loja" class="search-input2" placeholder="Categoria">

                <label for="editar-tags-loja"><strong>Tags</strong></label>
                <input type="text" id="editar-tags-loja" class="search-input2" placeholder="Ex.: SSD, Formatação, Limpeza">

                <p id="mensagem-edicao" class="auth-error" style="color: green;"></p>

                <button type="submit" class="auth-primary-btn" id="botao-salvar-loja">
                    Salvar alterações
                </button>
            </form>

        </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="perfil_lojista.html" class="nav-item"><img src="Casa e lupa minimalista_edited.png" class="home"></a>
        <a href="chat_lojista.html" class="nav-item"><img src="chat.png" class="home"></a>
        <a href="agendamento_lojista.html" class="nav-item"><img src="star.png" class="home"></a>
    </nav>

</div>

<script src="dados.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const parametros = new URLSearchParams(window.location.search);
  const lojaId = parametros.get("id");
  const novaLoja = parametros.get("nova");

  const campoNome = document.getElementById("editar-nome-loja");
  const campoEndereco = document.getElementById("editar-endereco-loja");
  const campoTelefone = document.getElementById("editar-telefone-loja");
  const campoCategoria = document.getElementById("editar-categoria-loja");
  const campoTags = document.getElementById("editar-tags-loja");
  const mensagem = document.getElementById("mensagem-edicao");
  const form = document.getElementById("form-editar-loja");
  const voltarLink = document.getElementById("voltar-loja-link");
  const tituloPagina = document.getElementById("titulo-pagina-loja");
  const botaoSalvar = document.getElementById("botao-salvar-loja");

  const idLojistaLogado = localStorage.getItem("lojistaLogado");

  if (!idLojistaLogado) {
    window.location.href = "index.html";
    return;
  }

  const lojista = lojistas.find(function (item) {
    return item.id === idLojistaLogado;
  });

  if (!lojista) {
    window.location.href = "index.html";
    return;
  }

  let loja = null;
  let modoCriacao = false;

  if (novaLoja === "1") {
    modoCriacao = true;
    tituloPagina.textContent = "Adicionar Loja";
    botaoSalvar.textContent = "Adicionar loja";
    voltarLink.href = "perfil_lojista.html";
  } else if (lojaId) {
    loja = lojas.find(function (item) {
      return item.id === lojaId;
    });

    if (!loja) {
      window.location.href = "perfil_lojista.html";
      return;
    }

    tituloPagina.textContent = "Editar Loja";
    botaoSalvar.textContent = "Salvar alterações";
    voltarLink.href = `loja.html?id=${loja.id}`;

    campoNome.value = loja.nome;
    campoEndereco.value = loja.endereco;
    campoTelefone.value = loja.telefone;
    campoCategoria.value = loja.categoria;
    campoTags.value = loja.tags.join(", ");
  } else {
    window.location.href = "perfil_lojista.html";
    return;
  }

  form.addEventListener("submit", function (event) {
    event.preventDefault();

    const nome = campoNome.value.trim();
    const endereco = campoEndereco.value.trim();
    const telefone = campoTelefone.value.trim();
    const categoria = campoCategoria.value.trim();
    const tags = campoTags.value
      .split(",")
      .map(function (tag) {
        return tag.trim();
      })
      .filter(function (tag) {
        return tag !== "";
      });

    if (!nome || !endereco || !telefone || !categoria) {
      mensagem.style.color = "red";
      mensagem.textContent = "Preencha todos os campos obrigatórios.";
      return;
    }

    if (modoCriacao) {
      const novoId = nome
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "-");

      const lojaNova = {
        id: novoId,
        nome: nome,
        lojistaId: lojista.id,
        endereco: endereco,
        telefone: telefone,
        categoria: categoria,
        tags: tags
      };

      lojas.push(lojaNova);

      if (!lojista.lojas.includes(lojaNova.id)) {
        lojista.lojas.push(lojaNova.id);
      }

      mensagem.style.color = "green";
      mensagem.textContent = "Loja adicionada com sucesso.";

      setTimeout(function () {
        window.location.href = "perfil_lojista.html";
      }, 1000);

      return;
    }

    loja.nome = nome;
    loja.endereco = endereco;
    loja.telefone = telefone;
    loja.categoria = categoria;
    loja.tags = tags;

    mensagem.style.color = "green";
    mensagem.textContent = "Alterações salvas com sucesso.";

    setTimeout(function () {
      window.location.href = `loja.html?id=${loja.id}`;
    }, 1000);
  });
});
</script>

</body>
</html>
