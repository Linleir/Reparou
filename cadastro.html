<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reparou - Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="mobile-container auth-screen">
    <div class="black-header">
      <a href="#" class="back-arrow" onclick="history.back(); return false;">←</a> 
      <h2 class="auth-title2">CADASTRO</h2>
    </div>

    <div class="content-area">
      <div class="white-window auth-window">
        <div class="auth-toggle">
          <a href="cadastro.html" class="auth-toggle-btn active">Cliente</a>
          <a href="cadastro_lojista.html" class="auth-toggle-btn">Lojista</a>
        </div>

        <form class="form-container">
          <label for="cadastro-documento-cliente"><strong>Login</strong></label>
          <input
            type="text"
            class="search-input2"
            id="cadastro-documento-cliente"
            placeholder="CPF"
            maxlength="14"
          >

          <label for="cadastro-senha-cliente"><strong>Senha</strong></label>
          <input
            type="password"
            class="search-input2"
            id="cadastro-senha-cliente"
            placeholder="123"
          >

          <label for="cadastro-confirmar-cliente"><strong>Confirmar senha</strong></label>
          <input
            type="password"
            class="search-input2"
            id="cadastro-confirmar-cliente"
            placeholder="123"
          >

          <a href="cadastro_sucesso.html" class="auth-primary-btn auth-btn-link">CADASTRAR</a>
        </form>
      </div>
    </div>
  </div>

  <script src="dados.js"></script>
  <script src="auth.js"></script>
</body>
</html>
