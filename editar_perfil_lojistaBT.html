<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Perfil Lojista</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="custom.css">
<link rel="stylesheet" href="Test.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bootstrap-app pb-5" style="background-color: #f4f4f4;">

<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <div class="black-header profile-edit-header p-3 text-center mb-4 position-relative rounded-4 shadow-sm">
        <a href="config_lojistaBT.html" class="back-btn position-absolute start-0 top-50 translate-middle-y ms-3 text-white">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="profile-center">
          <img src="imgtst.jpg" class="profile-img mb-2 rounded-circle border border-2 border-white" width="80" height="80" style="object-fit: cover;">
          <h5 class="mb-1 text-white">Editar Perfil Pessoal</h5>
          <p class="profile-user-subinfo small text-white-50 mb-0">Atualize os seus dados de acesso</p>
        </div>
      </div>

      <div class="card border-0 shadow-sm rounded-4 p-3 mb-4">
        <div class="mb-3">
          <label class="form-label fw-bold small text-muted">Nome do Responsável</label>
          <input type="text" id="perfil-nome" class="form-control bg-light rounded-3" placeholder="Nome">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold small text-muted">E-mail</label>
          <input type="email" id="perfil-email" class="form-control bg-light rounded-3" placeholder="Email">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold small text-muted">Telefone</label>
          <input type="text" id="perfil-telefone" class="form-control bg-light rounded-3" placeholder="Telefone">
        </div>

        <hr class="my-4 text-muted">

        <h6 class="fw-bold mb-3">Segurança</h6>

        <div class="mb-3">
          <label class="form-label fw-bold small text-muted">Nova Senha</label>
          <input type="password" id="perfil-senha-nova" class="form-control bg-light rounded-3" placeholder="Nova senha">
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold small text-muted">Confirmar Nova Senha</label>
          <input type="password" id="perfil-senha-confirmar" class="form-control bg-light rounded-3" placeholder="Repita a nova senha">
        </div>

        <button id="salvar-perfil-btn" class="btn btn-dark w-100 fw-bold rounded-pill mb-2 py-2" type="button">Salvar alterações</button>
        <a href="config_lojistaBT.html" class="btn btn-outline-dark w-100 fw-bold rounded-pill mb-4 py-2">Cancelar</a>
        
        <button id="excluir-perfil-btn" type="button" class="btn btn-danger w-100 fw-bold rounded-pill py-2">Excluir Perfil</button>
      </div>

    </div>
  </div>
</div>

<nav class="navbar fixed-bottom bg-black border-top">
    <div class="container d-flex justify-content-around text-center py-2">
        <a href="Perfil LojistaBT.html" class="text-white fs-4"><i class="fa-solid fa-store"></i></a>
        <a href="agendamento_lojistaBT.html" class="text-white fs-4"><i class="fa-solid fa-calendar-check"></i></a>
        <a href="chat_lojistaBT.html" class="text-white fs-4"><i class="fa-solid fa-comments"></i></a>
    </div>
</nav>

<script src="dados.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const idLojista = localStorage.getItem("lojistaLogado");
    if (!idLojista) {
        window.location.href = "indexBT.html";
        return;
    }

    const lojista = lojistas.find(l => l.id === idLojista);
    if (lojista) {
        document.getElementById('perfil-nome').value = lojista.responsavel;
        document.getElementById('perfil-email').value = lojista.email;
        document.getElementById('perfil-telefone').value = lojista.telefone;
    }

    document.getElementById('salvar-perfil-btn').addEventListener('click', () => {
        const senhaNova = document.getElementById('perfil-senha-nova').value;
        const senhaConfirma = document.getElementById('perfil-senha-confirmar').value;
        
        if(senhaNova && senhaNova !== senhaConfirma) {
            alert('As senhas não coincidem!');
            return;
        }
        
        alert('Perfil atualizado com sucesso!');
        window.location.href = 'config_lojistaBT.html';
    });

    document.getElementById('excluir-perfil-btn').addEventListener('click', () => {
        if(confirm('Tem a certeza que deseja excluir a sua conta? Esta ação é irreversível.')) {
            localStorage.removeItem('lojistaLogado');
            localStorage.removeItem('tipoUsuarioLogado');
            window.location.href = 'indexBT.html';
        }
    });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
