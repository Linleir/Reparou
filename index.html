<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reparou - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="mobile-container auth-screen">
    <div class="auth-header auth-header-center">
      <h1>REPAROU</h1>
      <p>Seu app de busca para<br>conserto de PCs e notebooks</p>
    </div>

    <div class="content-area">
      <div class="white-window auth-window">
        <form class="form-container">
          <label><strong>Login</strong></label>
          <input
            type="text"
            class="search-input2"
            placeholder="CPF/CNPJ"
          >

          <div class="auth-inline-text">
            <span>Não tem conta?</span>
            <a href="cadastro.html">CRIAR CONTA</a>
          </div>

          <label><strong>Senha</strong></label>
          <input
            type="password"
            class="search-input2"
            placeholder="Senha"
          >

          <a href="#" class="auth-link">Esqueceu sua senha?</a>

          <a href="acessos.html" class="auth-primary-btn auth-btn-link">LOGIN</a>
        </form>

        <a href="inicio_sem_conta.html" class="auth-secondary-btn auth-btn-link">
          Entrar sem conta
        </a>
      </div>
    </div>
  </div>
</body>
</html>
