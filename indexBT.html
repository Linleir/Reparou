<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reparou - Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS compatível -->
  <link rel="stylesheet" href="custom.css">
</head>

<body>

<div class="container min-vh-100 d-flex align-items-center">
  <div class="row justify-content-center w-100">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <!-- HEADER -->
      <div class="text-center mb-4">
        <h1 class="fw-bold">REPAROU</h1>
        <p class="text-muted">
          Seu app de busca para<br>conserto de PCs e notebooks
        </p>
      </div>

      <!-- CARD -->
      <div class="card rounded-custom shadow-soft p-4">

        <form id="login-form">

          <!-- LOGIN -->
          <div class="mb-3">
            <label for="login-documento" class="form-label">
              <strong>Login</strong>
            </label>
            <input
              type="text"
              class="form-control"
              id="login-documento"
              placeholder="CPF ou CNPJ"
              maxlength="18"
            >
          </div>

          <!-- LINK CADASTRO -->
          <div class="d-flex justify-content-between align-items-center mb-3 small">
            <span>Não tem conta?</span>
            <a href="cadastroBT.html" class="fw-bold text-decoration-none">
              CRIAR CONTA
            </a>
          </div>

          <!-- SENHA -->
          <div class="mb-2">
            <label for="login-senha" class="form-label">
              <strong>Senha</strong>
            </label>
            <input
              type="password"
              class="form-control"
              id="login-senha"
              placeholder="Senha"
            >
          </div>

          <!-- ESQUECEU -->
          <div class="mb-2">
            <a href="#" class="small text-decoration-none">
              Esqueceu sua senha?
            </a>
          </div>

          <!-- ERRO -->
          <p id="login-erro" class="text-danger small mb-3"></p>

          <!-- BOTÃO -->
          <button type="submit" class="btn btn-custom w-100 mb-3">
            LOGIN
          </button>

        </form>

        <!-- SEM CONTA -->
        <a href="inicio_sem_contaBT.html"
           class="btn btn-outline-secondary w-100">
          Entrar sem conta
        </a>

      </div>

    </div>
  </div>
</div>

<!-- JS -->
<script src="dados.js"></script>
<script src="auth.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
