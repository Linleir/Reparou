<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reparou - Cadastro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="custom.css">
</head>

<body class="bootstrap-app bg-light">

  <div class="container py-3">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-6 col-lg-4">

        <!-- HEADER -->
        <div class="black-header rounded-bottom mb-3 text-center p-3 position-relative">
          <a href="indexBT.html" class="back-btn position-absolute start-0 top-50 translate-middle-y ms-3">←</a>
          <h1 class="auth-title m-0">CADASTRO</h1>
        </div>

        <!-- CARD -->
        <div class="card shadow-sm border-0">
          <div class="card-body p-3">

            <!-- TOGGLE -->
            <div class="d-flex justify-content-between mb-3">
              <a href="cadastroBT.html" class="auth-toggle-btn active flex-fill text-center me-1">Cliente</a>
              <a href="cadastro_lojistaBT.html" class="auth-toggle-btn flex-fill text-center ms-1">Lojista</a>
            </div>

            <!-- FORM -->
            <form class="form-container">

              <div class="mb-3">
                <label for="cadastro-documento-cliente" class="form-label"><strong>Login</strong></label>
                <input
                  type="text"
                  class="form-control search-input2"
                  id="cadastro-documento-cliente"
                  placeholder="CPF"
                  maxlength="14"
                >
              </div>

              <div class="mb-3">
                <label for="cadastro-senha-cliente" class="form-label"><strong>Senha</strong></label>
                <input
                  type="password"
                  class="form-control search-input2"
                  id="cadastro-senha-cliente"
                  placeholder="123"
                >
              </div>

              <div class="mb-3">
                <label for="cadastro-confirmar-cliente" class="form-label"><strong>Confirmar senha</strong></label>
                <input
                  type="password"
                  class="form-control search-input2"
                  id="cadastro-confirmar-cliente"
                  placeholder="123"
                >
              </div>

              <div class="d-grid">
                <a href="cadastro_sucessoBT.html" class="btn btn-custom auth-primary-btn">
                  CADASTRAR
                </a>
              </div>

            </form>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="dados.js"></script>
  <script src="auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
