<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serviços da Loja</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="custom.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container py-3">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <div class="profile-header mb-3 shadow-soft text-center position-relative">
                <a href="inicio_clienteBT.html" class="position-absolute top-0 start-0 m-3 text-white fs-4">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>

                <div id="storePageRating" class="mb-2 text-warning fw-bold"></div>

                <button type="button" id="favoritoLojaBtn" class="btn btn-custom position-absolute top-0 end-0 m-3">
                    <i class="fa-regular fa-heart"></i>
                </button>

                <img src="imgtst.jpg" class="profile-img mb-2" id="lojaImagem" alt="Imagem da loja">

                <h5 id="lojaTitulo" class="mb-1">Loja</h5>
                <p id="lojaEndereco1" class="small mb-0 opacity-75"></p>
                <p id="lojaEndereco2" class="small mb-0 opacity-75"></p>
                <p id="lojaTelefone1" class="small mb-0 opacity-75"></p>
                <p id="lojaTelefone2" class="small mb-0 opacity-75"></p>
            </div>

            <div class="nav nav-tabs mb-3 justify-content-center">
                <a id="linkServicos" class="nav-link active" style="cursor: pointer;">Serviços</a>
                <a id="linkAvaliacoes" class="nav-link" style="cursor: pointer;">Avaliações</a>
                <a id="linkDenuncia" class="nav-link" style="cursor: pointer;">Denúncia</a>
            </div>

            <div class="mb-3">
                <input type="text" id="pesquisaServico" class="form-control mb-3 search-input" placeholder="Pesquisar serviço...">
                <div class="list-group" id="listaServicos"></div>
            </div>

        </div>
    </div>
</div>

<a href="MensagensBT.html" id="chatRapidoBtn" class="store-chat-fab">
    <i class="fa-solid fa-comments"></i><span>Chat</span>
</a>

<nav class="navbar bottom-nav fixed-bottom">
    <div class="container d-flex justify-content-around">
        <a href="inicio_clienteBT.html">
            <img src="Casa e lupa minimalista_edited.png" alt="Início">
        </a>
        <a href="Historico_de_AvaliacaoBT.html">
            <img src="star.png" alt="Avaliações">
        </a>
        <a href="MensagensBT.html">
            <img src="chat.png" alt="Chat">
        </a>
    </div>
</nav>

<script src="dados.js"></script>

<script>
    const lojaAtual = obterDadosLojaAtual();
    const lojaAtualId = obterLojaAtualId();

    // Configuração dos Links
    document.getElementById('linkServicos').href = montarLinkLoja('Avaliacaov2BT.html'); 
    document.getElementById('linkAvaliacoes').href = montarLinkLoja('avaliacaoBT.html');
    document.getElementById('linkDenuncia').href = montarLinkLoja('DenunciaBT.html');
    document.getElementById('chatRapidoBtn').href = construirLinkNovoChat(lojaAtualId, 'loja');

    // Preenchendo Informações da Loja
    document.getElementById('lojaImagem').src = lojaAtual.imagem;
    document.getElementById('lojaTitulo').textContent = lojaAtual.titulo;
    document.getElementById('lojaEndereco1').textContent = lojaAtual.enderecoLinhas[0] || '';
    document.getElementById('lojaEndereco2').textContent = lojaAtual.enderecoLinhas[1] || '';
    document.getElementById('lojaTelefone1').textContent = lojaAtual.telefones[0] || '';
    document.getElementById('lojaTelefone2').textContent = lojaAtual.telefones[1] || '';
    
    // Mostra a nota no topo
    document.getElementById('storePageRating').innerHTML = `★ ${formatarNota(lojaAtual.media)} (${lojaAtual.quantidadeAvaliacoes})`;

    // Elementos da Lista de Serviços
    const listaServicos = document.getElementById('listaServicos');
    const pesquisaServico = document.getElementById('pesquisaServico');

    // Sistema de Favoritos
    const favoritoLojaBtn = document.getElementById('favoritoLojaBtn');
    
    function atualizarBotaoFavoritoLoja() {
        const ativo = lojaEhFavorita(lojaAtualId);
        favoritoLojaBtn.classList.toggle('active', ativo);
        favoritoLojaBtn.innerHTML = `<i class="fa-${ativo ? 'solid' : 'regular'} fa-heart"></i>`;
    }

    favoritoLojaBtn.addEventListener('click', (event) => {
        event.preventDefault();
        alternarFavorito(lojaAtualId);
        atualizarBotaoFavoritoLoja();
    });

    atualizarBotaoFavoritoLoja();

    // Renderização dos Serviços
    function renderizarServicos(filtro = '') {
        const termo = filtro.trim().toLowerCase();
        const servicosFiltrados = lojaAtual.servicos.filter((servico) => servico.nome.toLowerCase().includes(termo));

        if (!servicosFiltrados.length) {
            listaServicos.innerHTML = '<div class="text-center text-muted p-3">Nenhum serviço encontrado.</div>';
            return;
        }

        listaServicos.innerHTML = servicosFiltrados.map((servico) => `
            <div class="list-group-item d-flex justify-content-between align-items-center mb-2 shadow-sm rounded-custom border-0" style="background: #fff; color: #000;">
                <div>
                    <strong>${servico.nome}</strong>
                    <div class="small text-muted">${servico.preco}</div>
                </div>
                <div class="text-end">
                    <div class="text-warning fw-bold">${formatarNota(servico.media)} ★</div>
                    <small class="text-muted">(${servico.quantidadeAvaliacoes})</small>
                </div>
            </div>
        `).join('');
    }

    // Listener para o campo de pesquisa
    pesquisaServico.addEventListener('input', (event) => renderizarServicos(event.target.value));
    
    // Inicia a lista ao carregar a página
    renderizarServicos();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
