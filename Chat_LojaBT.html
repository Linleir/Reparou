<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat com a Loja</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="custom.css">
    <link rel="stylesheet" href="Test.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bootstrap-app" style="padding-bottom: 140px;"> <div class="container py-2">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <header class="black-header chat-header-v2 mb-2 p-3 shadow-soft rounded">
                <div class="d-flex align-items-center mb-2">
                    <a href="MensagensBT.html" id="chatBackLink" class="back-btn me-2 text-white">
                        <i class="fa-solid fa-arrow-left"></i>
                    </a>
                    <h1 class="page-title chat-title mb-0 text-white">Chat</h1>
                </div>

                <div class="card chat-shop-card border-0">
                    <div class="card-body d-flex gap-3 align-items-center p-2">
                        <img src="" class="shop-img chat-shop-img rounded-circle" id="chatLojaImagem" style="width: 60px; height: 60px; object-fit: cover;">
                        <div>
                            <h6 id="chatLojaNome" class="mb-1 fw-bold">Loja</h6>
                            <p id="chatLojaEndereco" class="mb-0 small text-muted"></p>
                            <p id="chatLojaTelefone" class="mb-1 small text-muted"></p>
                            <span id="chatServiceChip" class="badge bg-primary mb-1"></span>
                            <div id="chatTagsRow" class="chat-tags-row d-flex flex-wrap gap-1"></div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="mb-4">
                <div id="chatStatusBox" class="chat-top-status mb-2 text-center small fw-bold"></div>

                <div id="chat-area" class="chat-area chat-area-v2 mb-3 d-flex flex-column gap-2"></div>

                <div id="avaliacaoCard" class="card chat-evaluation-card mb-3 shadow-sm border-0" style="display:none;">
                    <div class="card-body">
                        <h6 class="fw-bold">Avaliar serviço</h6>
                        <p class="small text-muted mb-2">Deixe a sua nota de 1 a 5 estrelas e um comentário.</p>
                        <div id="avaliacaoTagsRow" class="chat-tags-row mb-2"></div>
                        <div id="ratingStars" class="rating-stars mb-3 d-flex justify-content-center gap-2 fs-3 text-warning"></div>
                        <textarea id="avaliacaoTexto" class="form-control chat-review-input mb-3 bg-light" rows="3" placeholder="Descreva como foi o serviço"></textarea>
                        <button id="salvarAvaliacaoBtn" class="btn btn-dark w-100 fw-bold rounded-pill">Salvar avaliação</button>
                    </div>
                </div>

                <div id="chatFinalizadoCard" class="card chat-finished-actions mb-3 border-0 bg-light" style="display:none;">
                    <div class="card-body text-center">
                        <button id="novoChatBtn" class="btn btn-primary w-100 fw-bold rounded-pill">Iniciar novo chat com esta loja</button>
                    </div>
                </div>
            </main>

        </div>
    </div>
</div>

<div class="chat-input-fixed px-3 py-2 bg-white border-top">
    <div class="input-group">
        <input id="msg" class="form-control rounded-start-pill bg-light border-0" placeholder="Escreva uma mensagem...">
        <button id="enviarBtn" class="btn btn-dark rounded-end-pill px-4 fw-bold">Enviar</button>
    </div>
</div>

<nav class="navbar bottom-nav fixed-bottom bg-black">
    <div class="container d-flex justify-content-around">
        <a href="inicio_clienteBT.html"><img src="Casa e lupa minimalista_edited.png" width="26"></a>
        <a href="Historico_de_AvaliacaoBT.html"><img src="star.png" width="26"></a>
        <a href="MensagensBT.html"><img src="chat.png" width="26"></a>
    </div>
</nav>

<script src="dados.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const origem = params.get('origem') || 'historico';
const lojaIdOrigem = params.get('id') || 'loja-x';
let chatId = params.get('chat');

let chat = null;

if (!chatId && params.get('nova') === '1') {
    chat = criarRascunhoChat(lojaIdOrigem, 'generico');
} else {
    chat = obterChatPorId(chatId);
}

if (!chat) {
    chat = criarRascunhoChat(lojaIdOrigem || 'loja-x', 'generico');
}

const loja = obterInformacoesLoja(chat.lojaId);
const chatArea = document.getElementById('chat-area');
const msgInput = document.getElementById('msg');
const enviarBtn = document.getElementById('enviarBtn');
const chatStatusBox = document.getElementById('chatStatusBox');
const avaliacaoCard = document.getElementById('avaliacaoCard');
const avaliacaoTexto = document.getElementById('avaliacaoTexto');
const ratingStars = document.getElementById('ratingStars');
const salvarAvaliacaoBtn = document.getElementById('salvarAvaliacaoBtn');
const chatFinalizadoCard = document.getElementById('chatFinalizadoCard');
const novoChatBtn = document.getElementById('novoChatBtn');
const chatTagsRow = document.getElementById('chatTagsRow');
const avaliacaoTagsRow = document.getElementById('avaliacaoTagsRow');
let notaSelecionada = chat.avaliacao?.nota || 0;

document.getElementById('chatLojaImagem').src = loja.imagem || 'imgtst.jpg';
document.getElementById('chatLojaNome').textContent = loja.nome;
document.getElementById('chatLojaEndereco').textContent = loja.enderecoLinhas.join(' • ');
document.getElementById('chatLojaTelefone').textContent = loja.telefones.join(' • ');
document.getElementById('chatServiceChip').textContent = chat.tituloServico;

const chatBackLink = document.getElementById('chatBackLink');
chatBackLink.href = origem === 'loja' ? `Loja_XBT.html?id=${encodeURIComponent(chat.lojaId)}` : 'MensagensBT.html';

function renderizarTagChips(tags = []) {
    return (tags || []).slice(0, 3).map((tag) => `<span class="badge bg-secondary">${tag}</span>`).join('');
}

function renderizarTagsDoChat() {
    const tags = Array.isArray(chat.tags) && chat.tags.length ? chat.tags.slice(0, 3) : [chat.serviceTag];
    chatTagsRow.innerHTML = renderizarTagChips(tags);
    avaliacaoTagsRow.innerHTML = renderizarTagChips(tags);
}

function renderizarMensagens() {
    chatArea.innerHTML = chat.mensagens.map((mensagem) => {
        const isCliente = mensagem.autor === 'cliente';
        const alignClass = isCliente ? 'align-self-end bg-primary text-white' : 'align-self-start bg-light text-dark';
        return `
            <div class="p-2 rounded-3 shadow-sm ${alignClass}" style="max-width: 80%;">
                <p class="mb-1">${mensagem.texto}</p>
                <span class="d-block text-end small" style="font-size: 0.7rem; opacity: 0.7;">${formatarDataHora(mensagem.horario)}</span>
            </div>
        `;
    }).join('');
    
    // Auto-scroll para o final
    window.scrollTo(0, document.body.scrollHeight);
}

function renderizarStatus() {
    chatStatusBox.textContent = obterStatusChatLabel(chat.status);
    
    const finalizadoSemAvaliacao = chat.status === 'finalizado-sem-avaliacao' && !chat.avaliacao;
    const finalizadoAvaliado = chat.status === 'finalizado-avaliado' && !!chat.avaliacao;

    avaliacaoCard.style.display = finalizadoSemAvaliacao ? 'block' : 'none';
    chatFinalizadoCard.style.display = finalizadoAvaliado ? 'block' : 'none';
    msgInput.disabled = finalizadoSemAvaliacao || finalizadoAvaliado;
    enviarBtn.disabled = finalizadoSemAvaliacao || finalizadoAvaliado;
    msgInput.placeholder = finalizadoAvaliado ? 'Este chat já foi finalizado.' : (finalizadoSemAvaliacao ? 'Avalie o serviço para continuar.' : 'Escreva uma mensagem...');

    if (chat.avaliacao) {
        notaSelecionada = chat.avaliacao.nota;
        avaliacaoTexto.value = chat.avaliacao.texto;
        renderizarEstrelas();
    }
}

function renderizarEstrelas() {
    ratingStars.innerHTML = '';
    for (let nota = 1; nota <= 5; nota += 1) {
        const estrela = document.createElement('i');
        estrela.className = `${nota <= notaSelecionada ? 'fa-solid' : 'fa-regular'} fa-star`;
        estrela.style.cursor = 'pointer';
        estrela.addEventListener('click', () => {
            notaSelecionada = nota;
            renderizarEstrelas();
        });
        ratingStars.appendChild(estrela);
    }
}

function enviarMensagem() {
    const texto = msgInput.value.trim();
    if (!texto) return;

    if (chat.rascunho) {
        chatId = criarNovoChat(chat.lojaId, chat.autoTipo || 'generico', texto);
        chat = obterChatPorId(chatId);
        window.history.replaceState({}, '', construirLinkChat(chatId, origem));
    } else {
        const resultado = adicionarMensagemAoChat(chat.id, texto);
        chat = resultado.chat;
    }

    msgInput.value = '';
    renderizarTagsDoChat();
    renderizarMensagens();
    renderizarStatus();
}

enviarBtn.addEventListener('click', enviarMensagem);
msgInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
        event.preventDefault();
        enviarMensagem();
    }
});

salvarAvaliacaoBtn.addEventListener('click', () => {
    const texto = avaliacaoTexto.value.trim();
    if (!notaSelecionada || !texto) {
        alert('Selecione de 1 a 5 estrelas e escreva um comentário.');
        return;
    }
    salvarAvaliacaoDoChat(chat.id, notaSelecionada, texto);
    chat = obterChatPorId(chat.id);
    renderizarTagsDoChat();
    renderizarStatus();
});

novoChatBtn.addEventListener('click', () => {
    window.location.href = construirLinkNovoChat(chat.lojaId, origem);
});

renderizarEstrelas();
renderizarTagsDoChat();
renderizarMensagens();
renderizarStatus();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
