<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reparou - Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS compatível -->
  <link rel="stylesheet" href="Test.css">
</head>

<body>

<div class="container min-vh-100 d-flex align-items-center">
  <div class="row justify-content-center w-100">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <!-- HEADER -->
      <div class="text-center mb-4">
        <h1 class="fw-bold">REPAROU</h1>
        <p class="text-muted">
          Seu app de busca para<br>conserto de PCs e notebooks
        </p>
      </div>

      <!-- CARD -->
      <div class="card rounded-custom shadow-soft p-4">

        <form>

          <!-- LOGIN -->
          <div class="mb-3">
            <label class="form-label"><strong>Login</strong></label>
            <input
              type="text"
              class="form-control"
              placeholder="CPF/CNPJ"
            >
          </div>

          <!-- LINK CADASTRO -->
          <div class="d-flex justify-content-between align-items-center mb-3 small">
            <span>Não tem conta?</span>
            <a href="cadastro.html" class="text-decoration-none fw-bold">
              CRIAR CONTA
            </a>
          </div>

          <!-- SENHA -->
          <div class="mb-2">
            <label class="form-label"><strong>Senha</strong></label>
            <input
              type="password"
              class="form-control"
              placeholder="Senha"
            >
          </div>

          <!-- ESQUECEU -->
          <div class="mb-3">
            <a href="#" class="small text-decoration-none">
              Esqueceu sua senha?
            </a>
          </div>

          <!-- BOTÃO LOGIN -->
          <a href="acessos.html" class="btn btn-custom w-100 mb-3">
            LOGIN
          </a>

        </form>

        <!-- SEM CONTA -->
        <a href="index.html" class="btn btn-outline-secondary w-100">
          Entrar sem conta
        </a>

      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
