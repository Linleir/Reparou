<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="mobile-container">

    <!-- HEADER -->
    <div class="black-header">

        <a href="perfil_lojista.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <div class="profile-center">
            <img src="imgtst.jpg" class="profile2-img" alt="Imagem da loja">
            <h2 id="nome-loja">Nome da Loja</h2>
        </div>

    </div>

    <!-- CONTEÚDO -->
    <div class="content-area">

        <div class="white-window">

            <div class="perfil-info-bloco">
                <p><strong>Lojista responsável:</strong> <span id="nome-lojista"></span></p>
                <p><strong>Endereço:</strong> <span id="endereco-loja"></span></p>
                <p><strong>Telefone:</strong> <span id="telefone-loja"></span></p>
                <p><strong>Categoria:</strong> <span id="categoria-loja"></span></p>
            </div>

            <div class="perfil-tags-bloco">
                <h3>Tags da loja</h3>
                <div id="tags-loja" class="tags-container"></div>
            </div>

            <a id="editar-loja-link" href="#" class="item-card">
                <span>Editar loja</span>
            </a>

        </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="perfil_lojista.html" class="nav-item"><img src="Casa e lupa minimalista_edited.png" class="home"></a>
        <a href="#" class="nav-item"><img src="star.png" class="home"></a>
        <a href="#" class="nav-item"><img src="chat.png" class="home"></a>
    </nav>

</div>

<script src="dados.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const parametros = new URLSearchParams(window.location.search);
  const lojaId = parametros.get("id");

  if (!lojaId) {
    window.location.href = "perfil_lojista.html";
    return;
  }

  const loja = lojas.find(function (item) {
    return item.id === lojaId;
  });

  if (!loja) {
    window.location.href = "perfil_lojista.html";
    return;
  }

  const lojista = lojistas.find(function (item) {
    return item.id === loja.lojistaId;
  });

  document.getElementById("nome-loja").textContent = loja.nome;
  document.getElementById("nome-lojista").textContent = lojista ? lojista.responsavel : "Não encontrado";
  document.getElementById("endereco-loja").textContent = loja.endereco;
  document.getElementById("telefone-loja").textContent = loja.telefone;
  document.getElementById("categoria-loja").textContent = loja.categoria;

  const containerTags = document.getElementById("tags-loja");
  containerTags.innerHTML = "";

  loja.tags.forEach(function (tag) {
    containerTags.innerHTML += `<span class="tag-item">${tag}</span>`;
  });

  document.getElementById("editar-loja-link").href = `editar_loja.html?id=${loja.id}`;
});
</script>

</body>
</html>
