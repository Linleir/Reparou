<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Editar Loja</title>

<link rel="stylesheet" href="custom.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bootstrap-app">

<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <!-- HEADER -->
      <div class="black-header p-3 text-center mb-3 position-relative">

        <a id="voltar-loja-link" href="perfil lojistaBT.html"
           class="back-btn position-absolute start-0 top-50 translate-middle-y ms-2">
          <i class="fa-solid fa-arrow-left"></i>
        </a>

        <div class="profile-center">
          <img src="imgtst.jpg" class="profile2-img mb-2" alt="Editar loja">
          <h5 id="titulo-pagina-loja" class="mb-0">Editar Loja</h5>
        </div>

      </div>

      <!-- CONTEÚDO -->
      <div class="white-window p-3 mb-5">

        <form id="form-editar-loja">

          <!-- Nome -->
          <div class="mb-3">
            <label for="editar-nome-loja" class="form-label"><strong>Nome da loja</strong></label>
            <input type="text" id="editar-nome-loja" class="form-control" placeholder="Nome da loja">
          </div>

          <!-- Endereços -->
          <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="form-label mb-0"><strong>Endereço</strong></label>
            <button type="button" id="adicionar-endereco" class="btn btn-sm btn-outline-secondary">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
          <div id="lista-enderecos" class="mb-3"></div>

          <!-- Telefones -->
          <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="form-label mb-0"><strong>Telefone</strong></label>
            <button type="button" id="adicionar-telefone" class="btn btn-sm btn-outline-secondary">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
          <div id="lista-telefones" class="mb-3"></div>

          <!-- Tags -->
          <div class="mb-2">
            <label class="form-label"><strong>Tags</strong></label>
            <div id="tags-selecionadas" class="tags-selecionadas mb-2"></div>

            <input
              type="text"
              id="pesquisa-tags"
              class="form-control mb-2"
              placeholder="Pesquisar tags"
            >

            <div id="tags-disponiveis" class="tags-disponiveis-box"></div>
          </div>

          <!-- Mensagem -->
          <p id="mensagem-edicao" class="small mb-3"></p>

          <!-- Botões -->
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary w-100" id="botao-salvar-loja">
              Salvar alterações
            </button>

            <a href="perfil lojistaBT.html" id="botao-cancelar-loja"
               class="btn btn-outline-secondary w-100">
              Cancelar
            </a>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="navbar fixed-bottom bg-light border-top justify-content-around py-2">
  <a href="Perfil LojistaBT.html" class="text-center">
    <img src="Casa e lupa minimalista_edited.png" class="home">
  </a>
  <a href="chat_lojistaBT.html" class="text-center">
    <img src="chat.png" class="home">
  </a>
  <a href="agendamento_lojistaBT.html" class="text-center">
    <img src="star.png" class="home">
  </a>
</nav>

<script src="dados.js"></script>

<!-- JS ORIGINAL MANTIDO -->
<script>
/* SEU JS ORIGINAL SEM ALTERAÇÃO */
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
