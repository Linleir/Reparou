<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Editar Loja</title>

<link rel="stylesheet" href="Test.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="">

<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <!-- HEADER -->
      <div class="bg-black text-white text-center position-relative py-4 rounded-4 mb-3">

        <a id="voltar-loja-link"
           href="perfil lojistaBT.html"
           class="position-absolute start-0 top-50 translate-middle-y ms-3 text-white">
          <i class="fa-solid fa-arrow-left"></i>
        </a>

        <img src="imgtst.jpg" class="rounded-circle mb-2" width="80">
        <h5 id="titulo-pagina-loja">Editar Loja</h5>
      </div>

      <!-- CARD -->
      <div class="bg-white p-3 rounded-4 shadow-sm">

        <form id="form-editar-loja">

          <!-- NOME -->
          <div class="mb-3">
            <label class="form-label"><strong>Nome da loja</strong></label>
            <input type="text"
                   id="editar-nome-loja"
                   class="form-control rounded-3"
                   placeholder="Nome da loja">
          </div>

          <!-- ENDEREÇOS -->
          <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="mb-0"><strong>Endereço</strong></label>
            <button type="button"
                    id="adicionar-endereco"
                    class="btn btn-light btn-sm rounded-circle">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>

          <div id="lista-enderecos" class="mb-3"></div>

          <!-- TELEFONES -->
          <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="mb-0"><strong>Telefone</strong></label>
            <button type="button"
                    id="adicionar-telefone"
                    class="btn btn-light btn-sm rounded-circle">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>

          <div id="lista-telefones" class="mb-3"></div>

          <!-- TAGS -->
          <label class="mb-1"><strong>Tags</strong></label>

          <!-- selecionadas -->
          <div id="tags-selecionadas" class="d-flex flex-wrap gap-2 mb-2"></div>

          <!-- pesquisa -->
          <input type="text"
                 id="pesquisa-tags"
                 class="form-control rounded-3 mb-2"
                 placeholder="Pesquisar tags">

          <!-- disponíveis -->
          <div id="tags-disponiveis"
               class="bg-light rounded-4 p-2"
               style="max-height:120px; overflow-y:auto;">
          </div>

          <!-- mensagem -->
          <p id="mensagem-edicao" class="small mt-2"></p>

          <!-- BOTÕES -->
          <div class="mt-3">
            <button type="submit"
                    id="botao-salvar-loja"
                    class="btn btn-primary w-100 rounded-pill mb-2">
              Salvar alterações
            </button>

            <a href="editar_perfil_lojistaBT.html"
               id="botao-cancelar-loja"
               class="btn btn-secondary w-100 rounded-pill">
              Cancelar
            </a>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>

<!-- NAVBAR -->
<nav class="navbar fixed-bottom bg-black border-top justify-content-around py-2">
  <a href="editar_perfil_lojistaBT.html">
    <img src="Casa e lupa minimalista_edited.png" width="24">
  </a>
  <a href="chat_lojistaBT.html">
    <img src="chat.png" width="24">
  </a>
  <a href="agendamento_lojistaBT.html">
    <img src="star.png" width="24">
  </a>
</nav>
