<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reparou - Início</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="mobile-container pagina-inicio-cliente">

        <header class="top-bar inicio-top-bar">
            <input type="text" id="pesquisa-lojas" class="search-input" placeholder="Pesquisar loja, bairro ou serviço">

            <button type="button" id="abrir-filtros-lojas" class="filter-btn filter-btn-action">Filtro</button>

            <a href="Perfil Usuario.html" class="profile-btn">
                <svg viewBox="0 0 24 24" fill="black" width="30" height="30">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </a>
        </header>

        <section id="painel-filtros-lojas" class="inicio-filtros-panel" hidden>
            <div class="inicio-filtros-card">
                <div class="inicio-filtros-header">
                    <h3>Filtrar por tags e serviços</h3>
                    <button type="button" id="limpar-filtros-lojas" class="limpar-filtros-btn">Limpar</button>
                </div>

                <div id="tags-selecionadas-inicio" class="tags-selecionadas"></div>

                <input type="text" id="pesquisa-tags-inicio" class="search-input2" placeholder="Pesquisar tags ou serviços">

                <div id="tags-disponiveis-inicio" class="tags-disponiveis-box"></div>
            </div>
        </section>

        <h2 class="page-title" id="titulo-lista-lojas">Recomendações baseadas no seu local</h2>

        <main class="white-window white-window-lojas" id="listaLojasInicio"></main>

        <nav class="bottom-nav">
            <a href="inicio_cliente.html" class="nav-item"><img src="Casa e lupa minimalista_edited.png" class="home"></a>
            <a href="Historico_de_Avaliacao.html" class="nav-item"><img src="star.png" class="home"></a>
            <a href="Mensagems.html" class="nav-item"><img src="chat.png" class="home"></a>
        </nav>

    </div>

    <script src="dados.js"></script>
    <script>
        const listaLojasInicio = document.getElementById('listaLojasInicio');
        const campoPesquisaLojas = document.getElementById('pesquisa-lojas');
        const tituloListaLojas = document.getElementById('titulo-lista-lojas');
        const botaoAbrirFiltros = document.getElementById('abrir-filtros-lojas');
        const painelFiltros = document.getElementById('painel-filtros-lojas');
        const tagsSelecionadasContainer = document.getElementById('tags-selecionadas-inicio');
        const tagsDisponiveisContainer = document.getElementById('tags-disponiveis-inicio');
        const campoPesquisaTags = document.getElementById('pesquisa-tags-inicio');
        const botaoLimparFiltros = document.getElementById('limpar-filtros-lojas');

        let tagsSelecionadas = [];

        function atualizarTituloLista(total) {
            const haBusca = campoPesquisaLojas.value.trim().length > 0;
            const haFiltros = tagsSelecionadas.length > 0;
            tituloListaLojas.textContent = (haBusca || haFiltros)
                ? `${total} loja${total === 1 ? '' : 's'} encontrada${total === 1 ? '' : 's'}`
                : 'Recomendações baseadas no seu local';
        }

        function renderizarTagsFiltro() {
            const termoPesquisa = normalizarTexto(campoPesquisaTags.value);
            const todasTags = obterTagsPesquisaInicio();

            tagsSelecionadasContainer.innerHTML = '';
            tagsDisponiveisContainer.innerHTML = '';

            tagsSelecionadas.forEach((tag) => {
                tagsSelecionadasContainer.innerHTML += `
                    <button type="button" class="tag-selecionada-btn" data-tag="${tag}">
                        <span>${tag}</span>
                        <span>&times;</span>
                    </button>
                `;
            });

            todasTags
                .filter((tag) => !tagsSelecionadas.includes(tag))
                .filter((tag) => !termoPesquisa || normalizarTexto(tag).includes(termoPesquisa))
                .forEach((tag) => {
                    tagsDisponiveisContainer.innerHTML += `
                        <button type="button" class="tag-disponivel-btn" data-tag="${tag}">
                            <span>${tag}</span>
                            <span>+</span>
                        </button>
                    `;
                });

            tagsSelecionadasContainer.querySelectorAll('[data-tag]').forEach((botao) => {
                botao.onclick = () => {
                    tagsSelecionadas = tagsSelecionadas.filter((tag) => tag !== botao.dataset.tag);
                    renderizarTagsFiltro();
                    renderizarInicio();
                };
            });

            tagsDisponiveisContainer.querySelectorAll('[data-tag]').forEach((botao) => {
                botao.onclick = () => {
                    if (!tagsSelecionadas.includes(botao.dataset.tag)) {
                        tagsSelecionadas.push(botao.dataset.tag);
                    }
                    renderizarTagsFiltro();
                    renderizarInicio();
                };
            });
        }

        function renderizarInicio() {
            const lojasFiltradas = pesquisarLojasInicio(campoPesquisaLojas.value, tagsSelecionadas);
            atualizarTituloLista(lojasFiltradas.length);

            listaLojasInicio.innerHTML = lojasFiltradas.length
                ? lojasFiltradas.map((loja) => criarCardLojaHtml(loja, 'inicio')).join('')
                : '<div class="empty-state-lojas">Nenhuma loja encontrada com esses filtros.</div>';

            conectarFavoritosNoEscopo(listaLojasInicio);
        }

        botaoAbrirFiltros.addEventListener('click', () => {
            const abrir = painelFiltros.hasAttribute('hidden');
            if (abrir) {
                painelFiltros.removeAttribute('hidden');
                botaoAbrirFiltros.classList.add('active');
            } else {
                painelFiltros.setAttribute('hidden', 'hidden');
                botaoAbrirFiltros.classList.remove('active');
            }
        });

        botaoLimparFiltros.addEventListener('click', () => {
            tagsSelecionadas = [];
            campoPesquisaTags.value = '';
            renderizarTagsFiltro();
            renderizarInicio();
        });

        campoPesquisaTags.addEventListener('input', renderizarTagsFiltro);
        campoPesquisaLojas.addEventListener('input', renderizarInicio);
        document.addEventListener('favoritosAtualizados', renderizarInicio);

        renderizarTagsFiltro();
        renderizarInicio();
    </script>
</body>
</html>
