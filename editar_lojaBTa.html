<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Editar Loja</title>

<link rel="stylesheet" href="custom.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>



<body class="bg-dark">

<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <!-- HEADER -->
      <div class="bg-black text-white text-center position-relative py-4 rounded-4 mb-3">

        <a href="#" class="position-absolute start-0 top-50 translate-middle-y ms-3 text-white">
          <i class="fa-solid fa-arrow-left"></i>
        </a>

        <img src="imgtst.jpg" class="rounded-circle mb-2" width="80" height="80">
        <h5 class="mb-0">Editar Loja</h5>
      </div>

      <!-- CARD -->
      <div class="bg-white p-3 rounded-4 shadow-sm">

        <form>

          <!-- TELEFONE -->
          <div class="d-flex justify-content-between align-items-center mb-2">
            <strong>Telefone</strong>
            <button class="btn btn-light rounded-circle">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>

          <div class="bg-light rounded-3 px-3 py-2 d-flex justify-content-between align-items-center mb-3">
            <span>(21) 99111-1001</span>
            <i class="fa-solid fa-xmark"></i>
          </div>

          <!-- TAGS -->
          <strong>Tags</strong>

          <div class="d-flex flex-wrap gap-2 my-2">
            <span class="badge bg-secondary rounded-pill p-2">SSD ×</span>
            <span class="badge bg-secondary rounded-pill p-2">Formatação ×</span>
            <span class="badge bg-secondary rounded-pill p-2">Memória RAM ×</span>
            <span class="badge bg-secondary rounded-pill p-2">Notebook ×</span>
          </div>

          <input type="text" class="form-control mb-2 rounded-3" placeholder="Pesquisar tags">

          <!-- TAGS DISPONÍVEIS -->
          <div class="bg-light rounded-4 p-2" style="max-height:120px; overflow-y:auto;">
            <div class="d-flex flex-wrap gap-2">
              <button class="btn btn-light rounded-pill">Cooler +</button>
              <button class="btn btn-light rounded-pill">Setup Gamer +</button>
              <button class="btn btn-light rounded-pill">Console +</button>
              <button class="btn btn-light rounded-pill">Controle +</button>
            </div>
          </div>

          <!-- BOTÕES -->
          <div class="mt-4">
            <button class="btn btn-primary w-100 rounded-pill py-2 mb-2">
              Salvar alterações
            </button>

            <button class="btn btn-secondary w-100 rounded-pill py-2">
              Cancelar
            </button>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>

<!-- NAVBAR -->
<nav class="navbar fixed-bottom bg-black border-top justify-content-around py-2">
  <a href="#"><img src="Casa e lupa minimalista_edited.png" width="24"></a>
  <a href="#"><img src="chat.png" width="24"></a>
  <a href="#"><img src="star.png" width="24"></a>
</nav>

</body>
