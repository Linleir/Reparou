<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Loja</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="custom.css">
<link rel="stylesheet" href="Test.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-dark pb-5">

<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <div class="bg-black text-white text-center position-relative py-4 rounded-4 mb-3 shadow-sm">
        <a href="Perfil LojistaBT.html" class="position-absolute start-0 top-50 translate-middle-y ms-3 text-white fs-4">
          <i class="fa-solid fa-arrow-left"></i>
        </a>

        <img src="imgtst.jpg" class="rounded-circle mb-2" width="80" height="80" style="object-fit: cover;">
        <h5 class="mb-0 fw-bold">Editar Loja</h5>
      </div>

      <div class="bg-white p-3 rounded-4 shadow-sm mb-4">

        <form>

          <div class="mb-3">
            <label class="form-label fw-bold small text-muted">Nome da Loja</label>
            <input type="text" class="form-control rounded-3 bg-light" value="Loja Y" placeholder="Nome da Loja">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small text-muted">Endereço</label>
            <input type="text" class="form-control rounded-3 bg-light mb-2" value="Av. Central, 145" placeholder="Rua e Número">
            <input type="text" class="form-control rounded-3 bg-light" value="Copacabana, RJ" placeholder="Bairro e Cidade">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small text-muted">Telefones</label>
            <input type="text" class="form-control rounded-3 bg-light mb-2" value="(21) 97777-7777" placeholder="Telefone 1">
            <input type="text" class="form-control rounded-3 bg-light" value="(21) 96666-6666" placeholder="Telefone 2">
          </div>

          <label class="form-label fw-bold small text-muted">Serviços e Tags</label>
          <div class="d-flex flex-wrap gap-2 mb-3">
            <span class="badge bg-dark rounded-pill p-2 fw-normal" style="cursor: pointer;">Formatação <i class="fa-solid fa-times ms-1 text-danger"></i></span>
            <span class="badge bg-dark rounded-pill p-2 fw-normal" style="cursor: pointer;">Memória RAM <i class="fa-solid fa-times ms-1 text-danger"></i></span>
            <span class="badge bg-dark rounded-pill p-2 fw-normal" style="cursor: pointer;">Notebook <i class="fa-solid fa-times ms-1 text-danger"></i></span>
          </div>

          <input type="text" class="form-control mb-2 rounded-3 bg-light border-0" placeholder="Procurar mais serviços...">

          <div class="bg-light rounded-4 p-2 mb-4 border" style="max-height:120px; overflow-y:auto;">
            <div class="d-flex flex-wrap gap-2">
              <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill">Cooler <i class="fa-solid fa-plus ms-1"></i></button>
              <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill">Setup Gamer <i class="fa-solid fa-plus ms-1"></i></button>
              <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill">Console <i class="fa-solid fa-plus ms-1"></i></button>
              <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill">Controle <i class="fa-solid fa-plus ms-1"></i></button>
            </div>
          </div>

          <div class="mt-4">
            <button type="button" class="btn btn-primary w-100 rounded-pill py-2 mb-2 fw-bold" onclick="alert('As alterações foram guardadas!')">
              Salvar alterações
            </button>

            <a href="Perfil LojistaBT.html" class="btn btn-light w-100 rounded-pill py-2 fw-bold text-dark border">
              Cancelar
            </a>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>

<nav class="navbar fixed-bottom bg-black border-top">
    <div class="container d-flex justify-content-around text-center py-2">
        <a href="Perfil LojistaBT.html" class="text-white fs-4">
            <i class="fa-solid fa-store"></i>
        </a>
        <a href="agendamento_lojistaBT.html" class="text-white fs-4">
            <i class="fa-solid fa-calendar-check"></i>
        </a>
        <a href="chat_lojistaBT.html" class="text-white fs-4">
            <i class="fa-solid fa-comments"></i>
        </a>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
