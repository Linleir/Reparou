<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil do Lojista</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="mobile-container">

    <!-- HEADER -->
    <div class="black-header lojista-header-ajustado">

        <div class="lojista-topo-esquerda">
            <img src="imgtst.jpg" class="profile2-img" alt="Foto do lojista">

            <div class="lojista-topo-texto">
                <h2 id="nome-lojista">Lojista</h2>
                <p id="info-lojista">Informações do lojista</p>
            </div>
        </div>

        <a href="config_lojista.html" class="gear-btn">
            <i class="fa-solid fa-gear"></i>
        </a>

    </div>

    <!-- CONTEÚDO -->
    <div class="content-area">

        <div class="white-window lojista-window">

            <h3 class="lojista-subtitulo">Suas Lojas</h3>

            <div id="lista-lojas-lojista" class="lista-lojas-lojista">
                <!-- renderizado por JS -->
            </div>

        </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="perfil_lojista.html" class="nav-item">
            <img src="Casa e lupa minimalista_edited.png" class="home">
        </a>
        <a href="chat_lojista.html" class="nav-item">
            <img src="chat.png" class="home">
        </a>
        <a href="agendamento_lojista.html" class="nav-item">
            <img src="star.png" class="home">
        </a>
    </nav>

</div>

<script src="dados.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const idLojistaLogado = localStorage.getItem("lojistaLogado");

  if (!idLojistaLogado) {
    window.location.href = "index.html";
    return;
  }

  const lojista = lojistas.find(function (item) {
    return item.id === idLojistaLogado;
  });

  if (!lojista) {
    window.location.href = "index.html";
    return;
  }

  document.getElementById("nome-lojista").textContent = lojista.responsavel;
  document.getElementById("info-lojista").textContent = lojista.nomeLojaPrincipal;

  const containerLojas = document.getElementById("lista-lojas-lojista");
  containerLojas.innerHTML = "";

  const lojasDoLojista = lojas.filter(function (loja) {
    return loja.lojistaId === lojista.id;
  });

  lojasDoLojista.forEach(function (loja) {
    containerLojas.innerHTML += `
      <div class="loja-lojista-card">
        <a href="loja.html?id=${loja.id}" class="loja-lojista-link">
          <span>${loja.nome}</span>
        </a>

        <a href="editar_loja.html?id=${loja.id}" class="loja-lojista-menu">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </a>
      </div>
    `;
  });

  containerLojas.innerHTML += `
    <a href="editar_loja.html?nova=1" class="add-loja-btn">
      <i class="fa-solid fa-plus"></i>
    </a>
  `;
});
</script>

</body>
</html>
