<!-- SEU JS ORIGINAL (INALTERADO) -->
<script>
(function () {
  const STORAGE_KEY = 'reparouPerfilCliente';
  const perfilPadrao = {
    nome: 'Nome',
    sobrenome: 'do UsuarioX',
    dataNascimento: '',
    localizacao: {
      bairro: 'Méier',
      municipio: 'Rio de Janeiro',
      rua: '',
      numero: '',
      complemento: ''
    }
  };

  function lerPerfil() {
    try {
      const salvo = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if (!salvo) return perfilPadrao;
      return {
        ...perfilPadrao,
        ...salvo,
        localizacao: {
          ...perfilPadrao.localizacao,
          ...(salvo.localizacao || {})
        }
      };
    } catch {
      return perfilPadrao;
    }
  }

  function nomeCompleto(perfil) {
    return [perfil.nome, perfil.sobrenome].filter(Boolean).join(' ').trim() || 'Nome do UsuarioX';
  }

  function resumoLocal(perfil) {
    const local = perfil.localizacao || {};
    const partes = [local.bairro, local.municipio].filter(Boolean);
    return partes.length ? partes.join(' • ') : 'Base de busca local não definida';
  }

  const perfil = lerPerfil();
  document.getElementById('perfil-usuario-nome').textContent = nomeCompleto(perfil);
  document.getElementById('perfil-usuario-local').textContent = resumoLocal(perfil);
})();
</script>
