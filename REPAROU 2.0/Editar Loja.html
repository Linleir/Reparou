<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Loja</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos adicionais para bater com a imagem enviada */
        .form-container {
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-field {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .tag-container {
            background-color: white;
            border-radius: 15px;
            padding: 15px;
            min-height: 200px;
            margin-top: 5px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 8px;
        }

        .tag {
            background-color: #d9d9d9;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #333;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .main-btn {
            flex: 1;
            padding: 20px;
            border-radius: 35px;
            border: none;
            font-size: 22px;
            background-color: #d9d9d9;
            cursor: pointer;
            color: black;
        }

        label {
            font-size: 18px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <form class="form-container">
            
            <input type="text" class="input-field" placeholder="Nome da Loja">
            <input type="text" class="input-field" placeholder="endereço">

            <div class="row">
                <input type="text" class="input-field" placeholder="aberto das horas">
                <input type="text" class="input-field" placeholder="fecha na hora">
            </div>

            <label>Incluir Tags:</label>
            <div class="tag-container">
                <span class="tag">Reparo de SSD</span>
                <span class="tag">Diagnostico</span>
                <span class="tag">Reballing</span>
                <span class="tag">Adcionar Tag</span>
            </div>

            <div class="btn-group">
                <button type="submit" class="main-btn">Salvar</button>
                <button type="button" class="main-btn">Cancelar</button>
            </div>

        </form>
         <nav class="bottom-nav">
           <a href="index.html" class="nav-item"><img src="Casa e lupa minimalista_edited.png" class="home"></a>
            <a href="favoritos.html" class="nav-item"><img src="star.png" class="home"></a>
            <a href="Mensagems.html" class="nav-item"><img src="chat.png" class="home"></a>
        </nav>

    </div>

</body>
</html>
