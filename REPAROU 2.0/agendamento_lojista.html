<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos Lojista - Reparou</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ESTÉTICA FIEL AO PRINT + FIX DO SCROLL (APP NATIVO) */
        body {
            margin: 0;
            background-color: #333; /* Fundo escuro para quem vê no PC */
        }

        .mobile-container {
            background-color: #9f9a9a; /* Fundo cinza do print */
            height: 100vh; /* Trava a altura na tela do celular */
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            flex-direction: column; /* Organiza Topo, Meio e Rodapé */
            overflow: hidden; /* Impede a tela toda de rolar */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            padding: 0 !important; /* <-- AQUI ESTÁ A MAGIA QUE RESOLVE O RECUO DA TOOLBAR */
        }

        .black-header {
            background-color: #000000;
            color: #ffffff;
            padding: 15px;
            text-align: center;
            border-bottom: none;
            flex-shrink: 0; /* Header nunca encolhe */
            width: 100%;
            margin: 0;
        }

        /* ÁREA QUE REALMENTE ROLA */
        .scroll-area {
            flex-grow: 1; /* Preenche todo o espaço do meio */
            overflow-y: auto; /* Habilita a rolagem apenas aqui */
            padding: 20px;
            scrollbar-width: none; /* Esconde scrollbar no Firefox */
        }
        .scroll-area::-webkit-scrollbar { display: none; } /* Esconde scrollbar no Chrome */

        .white-board {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 20px;
            min-height: 100%; /* Garante que a placa branca preencha a tela */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Botões/Itens cinzas do print */
        .grey-pill {
            background-color: #dcdcdc;
            border-radius: 15px;
            color: #000;
            font-weight: bold;
            border: none;
            padding: 8px 16px;
            white-space: nowrap;
        }
        .grey-pill.active {
            background-color: #000000;
            color: #ffffff;
        }

        .agendamento-card {
            background-color: #dcdcdc;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            color: #000;
            position: relative;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .status-pendente { background-color: #ffcc00; color: #000; }
        .status-confirmado { background-color: #4caf50; color: #fff; }
        .status-cancelado { background-color: #f44336; color: #fff; }

        /* Toolbar preta inferior */
        .bottom-nav {
            background-color: #000000;
            height: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-shrink: 0; /* Rodapé nunca encolhe */
            width: 100% !important; /* <-- FORÇA A PREENCHER TUDO DE PONTA A PONTA */
            margin: 0 !important;
            padding: 0 !important;
        }
        .bottom-nav .nav-item {
            color: #ffffff;
            text-decoration: none;
            font-size: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.7;
        }
        .bottom-nav .nav-item.active {
            opacity: 1;
        }
        .bottom-nav .nav-item span {
            display: none;
        }
    </style>
</head>
<body class="bootstrap-app">
    
    <div class="mobile-container">
        
        <header class="black-header">
            <h2 class="m-0" style="font-size: 1.5rem; font-weight: bold;">Agendamentos</h2>
        </header>

        <div class="scroll-area">
            <main class="white-board">
                
                <div class="d-flex overflow-auto mb-4 pb-2" style="scrollbar-width: none; gap: 10px;" id="filtros-agendamento">
                    <button class="grey-pill active" data-filtro="todos" onclick="filtrarAgendamentos('todos')">Todos</button>
                    <button class="grey-pill" data-filtro="pendente" onclick="filtrarAgendamentos('pendente')">Pendentes</button>
                    <button class="grey-pill" data-filtro="confirmado" onclick="filtrarAgendamentos('confirmado')">Confirmados</button>
                </div>

                <div id="lista-agendamentos">
                    </div>

            </main>
        </div>

        <nav class="bottom-nav">
            <a href="perfil_lojista.html" class="nav-item">
                <i class="fa-solid fa-store"></i>
            </a>
            <a href="agendamentos_lojista.html" class="nav-item active">
                <i class="fa-solid fa-calendar-check"></i>
            </a>
            <a href="chat_lojista.html" class="nav-item">
                <i class="fa-solid fa-comments"></i>
            </a>
        </nav>

    </div>

    <script src="dados.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Autenticação
            const idLojista = localStorage.getItem('lojistaLogado');
            if (!idLojista || localStorage.getItem('tipoUsuarioLogado') !== 'lojista') {
                window.location.href = 'index.html';
                return;
            }

            // Gerar Mock
            const lojasDoLojista = lojas.filter(l => l.lojistaId === idLojista);
            let agendamentos = [];

            if (!localStorage.getItem(`agendamentos_${idLojista}`)) {
                const nomes = ["Mariana Costa", "Carlos Silva", "João Oliveira", "Ana Pereira"];
                const servicosDemo = ["Formatação", "Troca de Tela", "Limpeza Interna", "Upgrade SSD"];
                const statusDemo = ["pendente", "confirmado", "pendente", "cancelado"];
                
                for(let i=0; i < 4; i++) {
                    const lojaAleatoria = lojasDoLojista[Math.floor(Math.random() * lojasDoLojista.length)] || lojasDoLojista[0];
                    agendamentos.push({
                        id: `ag-${Date.now()}-${i}`,
                        cliente: nomes[i],
                        servico: servicosDemo[i],
                        lojaNome: lojaAleatoria ? lojaAleatoria.nome : 'Loja Central',
                        data: `2026-03-${20 + i}`,
                        hora: `1${i}:30`,
                        status: statusDemo[i]
                    });
                }
                localStorage.setItem(`agendamentos_${idLojista}`, JSON.stringify(agendamentos));
            } else {
                agendamentos = JSON.parse(localStorage.getItem(`agendamentos_${idLojista}`));
            }

            // Renderização
            window.renderizarAgendamentos = function(filtro = 'todos') {
                const container = document.getElementById('lista-agendamentos');
                container.innerHTML = '';

                const filtrados = agendamentos.filter(ag => filtro === 'todos' || ag.status === filtro);

                if (filtrados.length === 0) {
                    container.innerHTML = `<div class="text-center py-4 text-muted"><p>Sem agendamentos.</p></div>`;
                    return;
                }

                filtrados.sort((a, b) => new Date(a.data) - new Date(b.data)).forEach(ag => {
                    let badgeClass = `status-${ag.status}`;
                    let botoesHTML = '';

                    if (ag.status === 'pendente') {
                        botoesHTML = `
                            <button class="btn btn-sm btn-dark w-100 mb-2" onclick="alterarStatus('${ag.id}', 'confirmado')" style="border-radius: 10px;">Confirmar</button>
                            <button class="btn btn-sm w-100" onclick="alterarStatus('${ag.id}', 'cancelado')" style="border-radius: 10px; border: 1px solid #000; background: transparent; color: #000;">Cancelar</button>
                        `;
                    } else if (ag.status === 'confirmado') {
                        botoesHTML = `<button class="btn btn-sm w-100 mt-2" onclick="alterarStatus('${ag.id}', 'cancelado')" style="border-radius: 10px; border: 1px solid #000; background: transparent; color: #000;">Cancelar</button>`;
                    }

                    const dataFormatada = new Date(ag.data).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });

                    container.innerHTML += `
                        <div class="agendamento-card">
                            <span class="status-badge ${badgeClass}">${ag.status.toUpperCase()}</span>
                            <h5 class="fw-bold mb-1" style="font-size: 1.1rem;">${ag.cliente}</h5>
                            <p class="mb-1 small"><strong>Serviço:</strong> ${ag.servico}</p>
                            <p class="mb-2 small"><strong>Data:</strong> ${dataFormatada} às ${ag.hora}</p>
                            ${botoesHTML ? `<div class="mt-3">${botoesHTML}</div>` : ''}
                        </div>
                    `;
                });
            };

            window.alterarStatus = function(id, novoStatus) {
                const index = agendamentos.findIndex(ag => ag.id === id);
                if (index !== -1) {
                    agendamentos[index].status = novoStatus;
                    localStorage.setItem(`agendamentos_${idLojista}`, JSON.stringify(agendamentos));
                    const filtroAtivo = document.querySelector('.grey-pill.active').getAttribute('data-filtro');
                    renderizarAgendamentos(filtroAtivo);
                }
            };

            window.filtrarAgendamentos = function(filtro) {
                document.querySelectorAll('.grey-pill').forEach(btn => btn.classList.remove('active'));
                document.querySelector(`.grey-pill[data-filtro="${filtro}"]`).classList.add('active');
                renderizarAgendamentos(filtro);
            };

            renderizarAgendamentos('todos');
        });
    </script>
</body>
</html>
