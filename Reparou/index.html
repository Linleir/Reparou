<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Yan Izawa Vital</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        @page {
            size: A4;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
        }

        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: 10mm auto;
            padding: 20mm;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-top: 8px solid #003087; /* Bocom Blue */
        }

        @media print {
            body { background: white; margin: 0; }
            .a4-page { box-shadow: none; margin: 0; width: 100%; height: 100%; border-top: 12px solid #003087; }
        }

        header {
            margin-bottom: 25px;
        }

        h1 {
            color: #003087;
            font-size: 26pt;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .accent {
            color: #D20A11; /* Bocom Red */
        }

        .contact-info {
            font-size: 10pt;
            color: #666;
            margin-bottom: 15px;
        }

        .contact-info a {
            color: #003087;
            text-decoration: none;
            font-weight: 600;
        }

        h2 {
            color: #003087;
            font-size: 14pt;
            border-bottom: 2px solid #D20A11;
            padding-bottom: 4px;
            margin-top: 25px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h3 {
            color: #333;
            font-size: 11pt;
            margin: 0 0 4px 0;
        }

        p {
            font-size: 10pt;
            line-height: 1.6;
            text-align: justify;
            margin: 0 0 10px 0;
        }

        ul {
            font-size: 10pt;
            line-height: 1.5;
            margin: 5px 0 15px 0;
            padding-left: 18px;
        }

        li {
            margin-bottom: 4px;
        }

        .project-block {
            margin-bottom: 20px;
        }

        .highlight {
            font-weight: 600;
            color: #003087;
        }
    </style>
</head>
<body>

    <div class="a4-page">
        <header>
            <h1>Yan Izawa <span class="accent">Vital</span></h1>
            <div class="contact-info">
                Rio de Janeiro - RJ | 
                LinkedIn: <a href="https://www.linkedin.com/in/yan-izawa-aa560020b/" target="_blank">in/yan-izawa</a> | 
                GitHub: <a href="https://github.com/izawayan" target="_blank">
