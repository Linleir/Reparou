<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Perfil do Lojista</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS compatível -->
  <link rel="stylesheet" href="custom.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <!-- HEADER -->
      <div class="profile-header mb-3 shadow-soft text-center">

        <img src="imgtst.jpg" class="profile-img mb-2" alt="Foto do lojista">

        <h4 id="nome-lojista">Lojista</h4>
        <p id="info-lojista" class="profile-user-subinfo mb-2">
          Informações do lojista
        </p>

        <a href="config_lojistaBT.html" class="position-absolute top-0 end-0 m-3 text-white fs-5">
          <i class="fa-solid fa-gear"></i>
        </a>

      </div>

      <!-- CONTEÚDO -->
      <div class="card rounded-custom shadow-soft p-3 mb-5">

        <h5 class="mb-3">Suas lojas</h5>

        <!-- LISTA -->
        <div id="lista-lojas-lojista" class="list-group">
          <!-- renderizado por JS -->
        </div>

      </div>

    </div>
  </div>
</div>

<!-- NAVBAR INFERIOR -->
<nav class="navbar bottom-nav fixed-bottom">
  <div class="container d-flex justify-content-around">

    <a href="editar_perfil_lojistaBT.html">
      <img src="Casa e lupa minimalista_edited.png">
    </a>

    <a href="chat_lojistaBT.html">
      <img src="chat.png">
    </a>

    <a href="agendamento_lojistaBT.html">
      <img src="star.png">
    </a>

  </div>
</nav>

<!-- JS DADOS -->
<script src="dados.js"></script>

<!-- JS ORIGINAL (INALTERADO) -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const idLojistaLogado = localStorage.getItem("lojistaLogado");

  if (!idLojistaLogado) {
    window.location.href = "index.html";
    return;
  }

  const lojista = lojistas.find(function (item) {
    return item.id === idLojistaLogado;
  });

  if (!lojista) {
    window.location.href = "index.html";
    return;
  }

  document.getElementById("nome-lojista").textContent = lojista.responsavel;
  document.getElementById("info-lojista").textContent = lojista.nomeLojaPrincipal;

  const containerLojas = document.getElementById("lista-lojas-lojista");
  containerLojas.innerHTML = "";

  const lojasDoLojista = lojas.filter(function (loja) {
    return loja.lojistaId === lojista.id;
  });

  lojasDoLojista.forEach(function (loja) {
    containerLojas.innerHTML += `
      <a href="loja.html?id=${loja.id}" class="list-group-item d-flex justify-content-between align-items-center">
        <span>${loja.nome}</span>
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </a>
    `;
  });

  containerLojas.innerHTML += `
    <a href="editar_loja.html?nova=1" class="list-group-item text-center fw-bold">
      <i class="fa-solid fa-plus"></i>
    </a>
  `;
});
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
