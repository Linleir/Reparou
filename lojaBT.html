<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS compatível -->
<link rel="stylesheet" href="Test.css">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <!-- HEADER -->
      <div class="profile-header mb-3 shadow-soft text-center position-relative">

        <a href="Perfil LojistaBT.html" class="position-absolute top-0 start-0 m-3 text-white fs-4">
          <i class="fa-solid fa-arrow-left"></i>
        </a>

        <img src="imgtst.jpg" class="profile-img mb-2" alt="Imagem da loja">
        <h4 id="nome-loja">Nome da Loja</h4>

      </div>

      <!-- CONTEÚDO -->
      <div class="card rounded-custom shadow-soft p-3 mb-5">

        <!-- LOJISTA -->
        <div class="mb-3">
          <strong>Lojista responsável:</strong>
          <span id="nome-lojista"></span>
        </div>

        <!-- ENDEREÇOS -->
        <div class="mb-3">
          <h6>Endereços</h6>
          <div id="enderecos-loja" class="list-group small"></div>
        </div>

        <!-- TELEFONES -->
        <div class="mb-3">
          <h6>Telefones</h6>
          <div id="telefones-loja" class="list-group small"></div>
        </div>

        <!-- TAGS -->
        <div class="mb-3">
          <h6>Tags da loja</h6>
          <div id="tags-loja" class="d-flex flex-wrap gap-2"></div>
        </div>

        <!-- BOTÃO -->
        <a id="editar-loja-link" href="#" class="btn btn-custom w-100">
          Editar loja
        </a>

      </div>

    </div>
  </div>
</div>

<!-- NAVBAR INFERIOR -->
<nav class="navbar bottom-nav fixed-bottom">
  <div class="container d-flex justify-content-around">

    <a href="Perfil LojistaBT.html">
      <img src="Casa e lupa minimalista_edited.png">
    </a>

    <a href="chat_lojista.html">
      <img src="chat.png">
    </a>

    <a href="agendamento_lojista.html">
      <img src="star.png">
    </a>

  </div>
</nav>

<!-- JS DADOS -->
<script src="dados.js"></script>

<!-- JS ORIGINAL (INALTERADO) -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const parametros = new URLSearchParams(window.location.search);
  const lojaId = parametros.get("id");

  if (!lojaId) {
    window.location.href = "Perfil LojistaBT.html";
    return;
  }

  const loja = lojas.find(function (item) {
    return item.id === lojaId;
  });

  if (!loja) {
    window.location.href = "Perfil LojistaBT.html";
    return;
  }

  const lojista = lojistas.find(function (item) {
    return item.id === loja.lojistaId;
  });

  document.getElementById("nome-loja").textContent = loja.nome;
  document.getElementById("nome-lojista").textContent = lojista ? lojista.responsavel : "Não encontrado";

  const enderecosContainer = document.getElementById("enderecos-loja");
  const telefonesContainer = document.getElementById("telefones-loja");
  const tagsContainer = document.getElementById("tags-loja");

  enderecosContainer.innerHTML = "";
  telefonesContainer.innerHTML = "";
  tagsContainer.innerHTML = "";

  const enderecos = loja.enderecos || (loja.endereco ? [loja.endereco] : []);
  const telefones = loja.telefones || (loja.telefone ? [loja.telefone] : []);

  enderecos.forEach(function (endereco) {
    enderecosContainer.innerHTML += `<div class="list-group-item">${endereco}</div>`;
  });

  telefones.forEach(function (telefone) {
    telefonesContainer.innerHTML += `<div class="list-group-item">${telefone}</div>`;
  });

  loja.tags.forEach(function (tag) {
    tagsContainer.innerHTML += `<span class="badge bg-secondary">${tag}</span>`;
  });

  document.getElementById("editar-loja-link").href = `editar_lojaBT.html?id=${loja.id}`;
});
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
