<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Loja</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="custom.css">
</head>

<body class="bg-light">

<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <!-- HEADER -->
      <div class="black-header rounded-bottom mb-3 text-center p-3 position-relative">
        <a href="Perfil LojistaBT.html" class="back-btn position-absolute start-0 top-50 translate-middle-y ms-3">←</a>
        <h2 class="text-white m-0">Editar Loja</h2>
      </div>

      <!-- CARD -->
      <div class="card shadow-sm border-0">
        <div class="card-body p-3">

          <form class="form-container">

            <div class="mb-3">
              <input type="text" class="form-control input-field" placeholder="Nome da Loja">
            </div>

            <div class="mb-3">
              <input type="text" class="form-control input-field" placeholder="Endereço">
            </div>

            <!-- HORÁRIOS -->
            <div class="row mb-3">
              <div class="col-6">
                <input type="text" class="form-control input-field" placeholder="Abre às">
              </div>
              <div class="col-6">
                <input type="text" class="form-control input-field" placeholder="Fecha às">
              </div>
            </div>

            <div class="mb-2">
              <label class="form-label">Selecionar Tags:</label>
            </div>

            <!-- TAGS -->
            <div class="mb-3 tag-container">

              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="tag1">
                <label for="tag1" class="tag">Reparo SSD <span class="x">x</span></label>
              </div>

              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="tag2">
                <label for="tag2" class="tag">Diagnóstico <span class="x">x</span></label>
              </div>

              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="tag3">
                <label for="tag3" class="tag">Reballing <span class="x">x</span></label>
              </div>

              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="tag4">
                <label for="tag4" class="tag">Placa de Vídeo <span class="x">x</span></label>
              </div>

            </div>

            <!-- BOTÕES -->
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-custom main-btn">Salvar</button>
              <a href="Perfil LojistaBT.html" class="btn btn-custom main-btn cancel-btn">Cancelar</a>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
