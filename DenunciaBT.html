    <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Test.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bootstrap-app">

<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <!-- HEADER -->
      <div class="profile-header2 mb-3 shadow-soft text-center position-relative">

       
        <h5 class="page-title text-center mb-3">Denúncia</h5>

        <!-- PERFIL DA LOJA -->
        <div class="profile-header2 mb-3 shadow-soft text-center position-relative">

        <a id="linkVoltar" class="position-absolute top-0 start-0 m-3 text-white fs-4">
          <i class="fa-solid fa-arrow-left" ></i>
        </a>
        <img src="imgtst.jpg" class="profile-img mb-2" id="lojaImagem" alt="Imagem da loja">

        <h5 id="lojaTitulo">LOJA DE REPARO X</h5>
        <p id="lojaEndereco1" class="small mb-0"></p>
        <p id="lojaEndereco2" class="small mb-0"></p>
        <p id="lojaTelefone1" class="small mb-0"></p>
        <p id="lojaTelefone2" class="small mb-0"></p>

      </div>

        

      </div>


      <!-- TABS -->
      <div class="nav nav-tabs mb-3 justify-content-center">
  <a id="linkServicos" class="nav-link" href="#">Serviços</a>
  <a id="linkAvaliacoes" class="nav-link" href="#">Avaliações</a>
  <a id="linkDenuncia" class="nav-link active" href="#">Denúncia</a>
</div>




      <!-- CONTEÚDO -->
      <div class="mb-5">

        <div id="mensagemFeedback" class="feedback-box mb-3" aria-live="polite"></div>

        <!-- FORM -->
        <div class="card denuncia-form-container mb-3">
          <div class="card-body">

            <h6 class="mb-3">Tipo de Denúncia:</h6>

            <div class="tag-container d-flex flex-wrap gap-2">

              <input type="checkbox" id="racismo">
              <label class="tag" for="racismo">Racismo <span class="x">✕</span></label>

              <input type="checkbox" id="fraude">
              <label class="tag" for="fraude">Fraude <span class="x">✕</span></label>

              <input type="checkbox" id="assedio">
              <label class="tag" for="assedio">Assédio <span class="x">✕</span></label>

              <input type="checkbox" id="furto">
              <label class="tag" for="furto">Furto <span class="x">✕</span></label>

              <input type="checkbox" id="servico">
              <label class="tag" for="servico">Não Gostou do Serviço <span class="x">✕</span></label>

              <input type="checkbox" id="outro">
              <label class="tag" for="outro">Outro <span class="x">✕</span></label>

            </div>

          </div>
        </div>

        <!-- DESCRIÇÃO -->
        <h6 class="mb-2">O que aconteceu:</h6>
        <textarea id="descricaoDenuncia" class="form-control mb-3" rows="4" placeholder="Descrição da Denúncia"></textarea>

        <!-- BOTÕES -->
        <div class="d-flex gap-2">
          <button id="btnSalvarDenuncia" class="btn btn-custom main-btn w-100" type="button">Salvar</button>
          <button id="btnCancelarDenuncia" class="btn btn-secondary cancel-btn w-100" type="button">Cancelar</button>
        </div>

      </div>

    </div>
  </div>
</div>

<!-- FAB CHAT -->
<a href="MensagensBT.html" id="chatRapidoBtn" class="store-chat-fab">
  <i class="fa-solid fa-comments"></i><span>Chat</span>
</a>

<!-- NAVBAR INFERIOR  alterar talvez-->
<nav class="navbar bottom-nav fixed-bottom">
  <div class="container d-flex justify-content-around">

    <a href="inicio_clienteBT.html">
      <img src="Casa e lupa minimalista_edited.png">
    </a>

    <a href="Historico_de_AvaliacaoBT.html">
      <img src="star.png">
    </a>

    <a href="MensagensBT.html">
      <img src="chat.png">
    </a>

  </div>
</nav>

<script src="dados.js"></script>
<script>
const lojaAtual = obterDadosLojaAtual();
const lojaAtualId = obterLojaAtualId();
const mensagemFeedback = document.getElementById('mensagemFeedback');
const btnSalvarDenuncia = document.getElementById('btnSalvarDenuncia');
const btnCancelarDenuncia = document.getElementById('btnCancelarDenuncia');
const checkboxesMotivos = document.querySelectorAll('.tag-container input[type="checkbox"]');
let timeoutMensagem = null;

document.getElementById('linkVoltar').href = montarLinkLoja('Loja_XBT.html');
document.getElementById('linkServicos').href = montarLinkLoja('Loja_XBT.html');
document.getElementById('linkAvaliacoes').href = montarLinkLoja('avaliacaoBT.html');
document.getElementById('linkDenuncia').href = montarLinkLoja('DenunciaBT.html');
document.getElementById('chatRapidoBtn').href = construirLinkNovoChat(lojaAtualId, 'loja');

document.getElementById('lojaImagem').src = lojaAtual.imagem;
document.getElementById('lojaTitulo').textContent = lojaAtual.titulo;
document.getElementById('lojaEndereco1').textContent = lojaAtual.enderecoLinhas[0] || '';
document.getElementById('lojaEndereco2').textContent = lojaAtual.enderecoLinhas[1] || '';
document.getElementById('lojaTelefone1').textContent = lojaAtual.telefones[0] || '';
document.getElementById('lojaTelefone2').textContent = lojaAtual.telefones[1] || '';

function mostrarMensagem(texto, tipo) {
    if (timeoutMensagem) {
        clearTimeout(timeoutMensagem);
        timeoutMensagem = null;
    }

    mensagemFeedback.textContent = texto;
    mensagemFeedback.classList.remove('feedback-sucesso', 'feedback-erro', 'feedback-visivel');

    if (tipo === 'sucesso') {
        mensagemFeedback.classList.add('feedback-sucesso');
    } else {
        mensagemFeedback.classList.add('feedback-erro');
    }

    mensagemFeedback.classList.add('feedback-visivel');

    if (tipo === 'erro') {
        timeoutMensagem = setTimeout(() => {
            mensagemFeedback.classList.remove('feedback-visivel');
        }, 3000);
    }
}

function temMotivoSelecionado() {
    return Array.from(checkboxesMotivos).some((checkbox) => checkbox.checked);
}

function voltarParaLoja() {
    setTimeout(() => {
        window.location.href = montarLinkLoja('Loja_XBT.html');
    }, 1300);
}

btnSalvarDenuncia.addEventListener('click', () => {
    if (!temMotivoSelecionado()) {
        mostrarMensagem('Selecione pelo menos 1 motivo para enviar a denúncia.', 'erro');
        return;
    }

    mostrarMensagem('Sua denúncia foi salva com sucesso.', 'sucesso');
    voltarParaLoja();
});

btnCancelarDenuncia.addEventListener('click', () => {
    mostrarMensagem('Denúncia cancelada com sucesso.', 'sucesso');
    voltarParaLoja();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
