<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalhe da Avaliação</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Test.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bootstrap-app">

<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <!-- HEADER -->
      <div class="black-header d-flex align-items-center mb-3 p-3">
        <a href="Historico_de_AvaliacaoBT.html" class="back-btn me-2" aria-label="Voltar">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h5 class="page-title mb-0 text-center w-100">Sua avaliação</h5>
      </div>

      <!-- CONTEÚDO -->
      <div class="card review-detail-window mb-5">
        <div class="card-body">

          <!-- HEADER DA REVIEW -->
          <div class="d-flex gap-3 mb-3 review-detail-header">
            <img id="reviewLojaImagem" src="imgtst.jpg" class="item-img" alt="Loja avaliada">
            <div>
              <h6 id="reviewLojaNome" class="mb-1">Loja</h6>
              <p id="reviewServico" class="mb-1"></p>
              <div id="reviewTags" class="review-chip-row review-chip-row-inline mb-1"></div>
              <p id="reviewData" class="mb-0 small"></p>
            </div>
          </div>

          <!-- RESUMO -->
          <div class="card review-summary-box mb-3 p-3">
            <h6>Resumo</h6>
            <p id="reviewResumo" class="mb-0"></p>
          </div>

          <!-- ESTRELAS -->
          <div class="rating-stars review-edit-stars mb-3 text-center" id="reviewEditStars"></div>

          <!-- TEXTO -->
          <textarea 
            id="reviewTexto" 
            class="form-control chat-review-input mb-3" 
            rows="5" 
            placeholder="Edite sua avaliação">
          </textarea>

          <!-- BOTÃO -->
          <div class="d-grid">
            <button id="salvarEdicaoBtn" class="btn btn-custom main-btn" type="button">
              Salvar alterações
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<!-- NAVBAR INFERIOR  alterar talvez-->
<nav class="navbar bottom-nav fixed-bottom">
  <div class="container d-flex justify-content-around">

    <a href="inicio_clienteBT.html">
      <img src="Casa e lupa minimalista_edited.png">
    </a>

    <a href="Historico_de_AvaliacaoBT.html">
      <img src="star.png">
    </a>

    <a href="MensagensBT.html">
      <img src="chat.png">
    </a>

  </div>
</nav>

<script src="dados.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const avaliacao = obterAvaliacaoPorId(params.get('avaliacao'));
    let notaSelecionada = avaliacao?.nota || 0;

    function renderizarTags(tags = []) {
        return (tags || []).slice(0, 3).map((tag) => `<span class="review-service-chip">${tag}</span>`).join('');
    }

    if (!avaliacao) {
        window.location.href = 'Historico_de_AvaliacaoBT.html';
    } else {
        const loja = obterInformacoesLoja(avaliacao.lojaId);
        document.getElementById('reviewLojaImagem').src = loja.imagem;
        document.getElementById('reviewLojaNome').textContent = loja.nome;
        document.getElementById('reviewServico').textContent = avaliacao.tituloServico;
        document.getElementById('reviewTags').innerHTML = renderizarTags(avaliacao.tags || [avaliacao.serviceTag]);
        document.getElementById('reviewData').textContent = `Escrito em ${formatarDataHora(avaliacao.dataIso)}`;
        document.getElementById('reviewTexto').value = avaliacao.texto;

        function atualizarResumo() {
            document.getElementById('reviewResumo').textContent = `Nota ${notaSelecionada.toFixed(1).replace('.', ',')} de 5 estrelas.`;
        }

        function renderizarEstrelas() {
            const container = document.getElementById('reviewEditStars');
            container.innerHTML = '';
            for (let nota = 1; nota <= 5; nota += 1) {
                const estrela = document.createElement('button');
                estrela.type = 'button';
                estrela.className = `star-select ${nota <= notaSelecionada ? 'active' : ''}`;
                estrela.innerHTML = '★';
                estrela.addEventListener('click', () => {
                    notaSelecionada = nota;
                    renderizarEstrelas();
                    atualizarResumo();
                });
                container.appendChild(estrela);
            }
        }

        document.getElementById('salvarEdicaoBtn').addEventListener('click', () => {
            const texto = document.getElementById('reviewTexto').value.trim();
            if (!texto || !notaSelecionada) {
                alert('Defina uma nota e escreva um comentário.');
                return;
            }
            salvarAvaliacaoDoChat(avaliacao.chatId, notaSelecionada, texto);
            window.location.href = 'Historico_de_AvaliacaoBT.html';
        });

        renderizarEstrelas();
        atualizarResumo();
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
