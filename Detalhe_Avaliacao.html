<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalhe da Avaliação</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="mobile-container">
    <div class="black-header">
        <a href="Historico_de_Avaliacao.html" class="back-btn" aria-label="Voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h2 class="page-title">Sua avaliação</h2>
    </div>

    <div class="content-area">
        <div class="white-window review-detail-window">
            <div class="review-detail-header">
                <img id="reviewLojaImagem" src="imgtst.jpg" class="item-img" alt="Loja avaliada">
                <div>
                    <h3 id="reviewLojaNome">Loja</h3>
                    <p id="reviewServico"></p>
                    <p id="reviewData"></p>
                </div>
            </div>

            <div class="review-summary-box">
                <h4>Resumo</h4>
                <p id="reviewResumo"></p>
            </div>

            <div class="rating-stars review-edit-stars" id="reviewEditStars"></div>
            <textarea id="reviewTexto" class="search-input chat-review-input" rows="5" placeholder="Edite sua avaliação"></textarea>

            <div class="btn-group">
                <button id="salvarEdicaoBtn" class="main-btn" type="button">Salvar alterações</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="inicio_cliente.html" class="nav-item"><img src="Casa e lupa minimalista_edited.png" class="home"></a>
        <a href="Historico_de_Avaliacao.html" class="nav-item"><img src="star.png" class="home"></a>
        <a href="Mensagems.html" class="nav-item"><img src="chat.png" class="home"></a>
    </nav>
</div>

<script src="dados.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const avaliacao = obterAvaliacaoPorId(params.get('avaliacao'));
    let notaSelecionada = avaliacao?.nota || 0;

    if (!avaliacao) {
        window.location.href = 'Historico_de_Avaliacao.html';
    } else {
        const loja = obterInformacoesLoja(avaliacao.lojaId);
        document.getElementById('reviewLojaImagem').src = loja.imagem;
        document.getElementById('reviewLojaNome').textContent = loja.nome;
        document.getElementById('reviewServico').textContent = avaliacao.tituloServico;
        document.getElementById('reviewData').textContent = `Escrito em ${formatarDataHora(avaliacao.dataIso)}`;
        document.getElementById('reviewTexto').value = avaliacao.texto;

        function atualizarResumo() {
            document.getElementById('reviewResumo').textContent = `Nota ${notaSelecionada.toFixed(1).replace('.', ',')} de 5 estrelas.`;
        }

        function renderizarEstrelas() {
            const container = document.getElementById('reviewEditStars');
            container.innerHTML = '';
            for (let nota = 1; nota <= 5; nota += 1) {
                const estrela = document.createElement('button');
                estrela.type = 'button';
                estrela.className = `star-select ${nota <= notaSelecionada ? 'active' : ''}`;
                estrela.innerHTML = '★';
                estrela.addEventListener('click', () => {
                    notaSelecionada = nota;
                    renderizarEstrelas();
                    atualizarResumo();
                });
                container.appendChild(estrela);
            }
        }

        document.getElementById('salvarEdicaoBtn').addEventListener('click', () => {
            const texto = document.getElementById('reviewTexto').value.trim();
            if (!texto || !notaSelecionada) {
                alert('Defina uma nota e escreva um comentário.');
                return;
            }
            salvarAvaliacaoDoChat(avaliacao.chatId, notaSelecionada, texto);
            window.location.href = 'Historico_de_Avaliacao.html';
        });

        renderizarEstrelas();
        atualizarResumo();
    }

</script>
</body>
</html>
