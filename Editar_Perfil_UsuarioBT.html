<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Perfil</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="custom.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body class="bootstrap-app">

<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <!-- HEADER -->
      <div class="black-header profile-edit-header p-3 text-center mb-3 position-relative">
        <a href="Perfil UsuarioBTv2.html" class="back-btn position-absolute start-0 top-50 translate-middle-y ms-2">
          <i class="fa-solid fa-arrow-left"></i>
        </a>

        <div class="profile-center profile-user-center">
          <img src="imgtst.jpg" class="profile2-img mb-2" alt="Foto de perfil">
          <h5 class="mb-1">Editar perfil</h5>
          <p class="profile-user-subinfo small mb-0">Atualize seus dados pessoais e base de busca</p>
        </div>
      </div>

      <!-- CONTEÚDO -->
      <div class="white-window profile-edit-window p-3 mb-5">

        <div id="perfil-feedback" class="profile-feedback mb-3" aria-live="polite"></div>

        <!-- DADOS -->
        <div class="mb-3">
          <label for="perfil-nome" class="form-label"><strong>Nome</strong></label>
          <input type="text" id="perfil-nome" class="form-control" placeholder="Seu nome">
        </div>

        <div class="mb-3">
          <label for="perfil-sobrenome" class="form-label"><strong>Sobrenome</strong></label>
          <input type="text" id="perfil-sobrenome" class="form-control" placeholder="Seu sobrenome">
        </div>

        <div class="mb-3">
          <label for="perfil-data" class="form-label"><strong>Data de nascimento</strong></label>
          <input type="date" id="perfil-data" class="form-control">
        </div>

        <!-- LOCALIZAÇÃO -->
        <div class="mb-3">
          <h6>Base das pesquisas por local</h6>

          <div class="mb-2">
            <label for="perfil-bairro" class="form-label"><strong>Bairro</strong></label>
            <input type="text" id="perfil-bairro" class="form-control" placeholder="Ex.: Méier">
          </div>

          <div class="mb-2">
            <label for="perfil-municipio" class="form-label"><strong>Município</strong></label>
            <input type="text" id="perfil-municipio" class="form-control" placeholder="Ex.: Rio de Janeiro">
          </div>

          <div class="mb-2">
            <label for="perfil-rua" class="form-label"><strong>Rua</strong></label>
            <input type="text" id="perfil-rua" class="form-control" placeholder="Ex.: Rua Tecnológica">
          </div>

          <div class="row">
            <div class="col-6 mb-2">
              <label for="perfil-numero" class="form-label"><strong>Número</strong></label>
              <input type="text" id="perfil-numero" class="form-control" placeholder="123">
            </div>
            <div class="col-6 mb-2">
              <label for="perfil-complemento" class="form-label"><strong>Complemento</strong></label>
              <input type="text" id="perfil-complemento" class="form-control" placeholder="Apto, bloco...">
            </div>
          </div>
        </div>

        <!-- SENHA -->
        <div class="mb-3">
          <h6>Trocar senha</h6>

          <div class="mb-2">
            <label for="perfil-senha-atual" class="form-label"><strong>Senha atual</strong></label>
            <input type="password" id="perfil-senha-atual" class="form-control" placeholder="Senha atual">
          </div>

          <div class="mb-2">
            <label for="perfil-senha-nova" class="form-label"><strong>Nova senha</strong></label>
            <input type="password" id="perfil-senha-nova" class="form-control" placeholder="Nova senha">
          </div>

          <div class="mb-2">
            <label for="perfil-senha-confirmar" class="form-label"><strong>Confirmar nova senha</strong></label>
            <input type="password" id="perfil-senha-confirmar" class="form-control" placeholder="Repita a nova senha">
          </div>
        </div>

        <!-- BOTÕES -->
        <div class="d-flex gap-2 mb-3">
          <button id="salvar-perfil-btn" class="btn btn-primary w-100" type="button">
            Salvar alterações
          </button>
          <a href="Perfil UsuarioBTv2.html" class="btn btn-outline-secondary w-100">
            Cancelar
          </a>
        </div>

        <button id="excluir-perfil-btn" type="button" class="btn btn-danger w-100">
          Excluir perfil
        </button>

      </div>

    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="navbar fixed-bottom bg-light border-top justify-content-around py-2">
  <a href="inicio_clienteBT.html" class="text-center">
    <img src="Casa e lupa minimalista_edited.png" class="home">
  </a>
  <a href="Historico_de_AvaliacaoBT.html" class="text-center">
    <img src="star.png" class="home">
  </a>
  <a href="MensagensBT.html" class="text-center">
    <img src="chat.png" class="home">
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS ORIGINAL (INALTERADO) -->
<script>
(function () {
  const STORAGE_KEY = 'reparouPerfilCliente';
  const PASSWORD_KEY = 'reparouSenhaCliente';
  const padrao = {
    nome: 'Nome',
    sobrenome: 'do UsuarioX',
    dataNascimento: '',
    localizacao: {
      bairro: 'Méier',
      municipio: 'Rio de Janeiro',
      rua: '',
      numero: '',
      complemento: ''
    }
  };

  function lerPerfil() {
    try {
      const salvo = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if (!salvo) return JSON.parse(JSON.stringify(padrao));
      return {
        ...padrao,
        ...salvo,
        localizacao: {
          ...padrao.localizacao,
          ...(salvo.localizacao || {})
        }
      };
    } catch {
      return JSON.parse(JSON.stringify(padrao));
    }
  }

  function salvarPerfil(perfil) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(perfil));
  }

  function mostrarFeedback(texto, tipo) {
    const box = document.getElementById('perfil-feedback');
    box.textContent = texto;
    box.className = 'profile-feedback ' + (tipo || 'success');
    box.style.display = 'block';
    box.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  const perfil = lerPerfil();
  document.getElementById('perfil-nome').value = perfil.nome || '';
  document.getElementById('perfil-sobrenome').value = perfil.sobrenome || '';
  document.getElementById('perfil-data').value = perfil.dataNascimento || '';
  document.getElementById('perfil-bairro').value = perfil.localizacao?.bairro || '';
  document.getElementById('perfil-municipio').value = perfil.localizacao?.municipio || '';
  document.getElementById('perfil-rua').value = perfil.localizacao?.rua || '';
  document.getElementById('perfil-numero').value = perfil.localizacao?.numero || '';
  document.getElementById('perfil-complemento').value = perfil.localizacao?.complemento || '';

  document.getElementById('salvar-perfil-btn').addEventListener('click', function () {
    const nome = document.getElementById('perfil-nome').value.trim();
    const sobrenome = document.getElementById('perfil-sobrenome').value.trim();
    const dataNascimento = document.getElementById('perfil-data').value;
    const bairro = document.getElementById('perfil-bairro').value.trim();
    const municipio = document.getElementById('perfil-municipio').value.trim();
    const rua = document.getElementById('perfil-rua').value.trim();
    const numero = document.getElementById('perfil-numero').value.trim();
    const complemento = document.getElementById('perfil-complemento').value.trim();
    const senhaAtual = document.getElementById('perfil-senha-atual').value;
    const senhaNova = document.getElementById('perfil-senha-nova').value;
    const senhaConfirmar = document.getElementById('perfil-senha-confirmar').value;

    if (!nome || !sobrenome) {
      mostrarFeedback('Preencha nome e sobrenome para salvar o perfil.', 'error');
      return;
    }

    if ((senhaAtual || senhaNova || senhaConfirmar)) {
      const senhaSalva = localStorage.getItem(PASSWORD_KEY) || '123';
      if (senhaAtual !== senhaSalva) {
        mostrarFeedback('A senha atual informada está incorreta.', 'error');
        return;
      }
      if (!senhaNova || senhaNova.length < 3) {
        mostrarFeedback('A nova senha precisa ter pelo menos 3 caracteres.', 'error');
        return;
      }
      if (senhaNova !== senhaConfirmar) {
        mostrarFeedback('A confirmação da nova senha não confere.', 'error');
        return;
      }
      localStorage.setItem(PASSWORD_KEY, senhaNova);
    }

    salvarPerfil({
      nome,
      sobrenome,
      dataNascimento,
      localizacao: { bairro, municipio, rua, numero, complemento }
    });

    document.getElementById('perfil-senha-atual').value = '';
    document.getElementById('perfil-senha-nova').value = '';
    document.getElementById('perfil-senha-confirmar').value = '';

    mostrarFeedback('Perfil atualizado com sucesso.', 'success');
    setTimeout(function () {
      window.location.href = 'Perfil Usuario.html';
    }, 900);
  });

  function obterChatsSalvos() {
    const possiveisChaves = [
      'reparouChatsDemoV4',
      'reparouChatsDemoV3',
      'reparouChatsDemoV2',
      'reparouChatsDemo',
      'reparouChatsCliente',
      'reparouChats'
    ];

    for (const chave of possiveisChaves) {
      try {
        const bruto = localStorage.getItem(chave);
        if (!bruto) continue;
        const valor = JSON.parse(bruto);
        if (Array.isArray(valor)) return valor;
      } catch {}
    }

    return [];
  }

  function existeChatPendenteOuEmAndamento() {
    return obterChatsSalvos().some((chat) => {
      const status = String(chat?.status || '').trim().toLowerCase();
      return status && status !== 'finalizado-avaliado';
    });
  }

  document.getElementById('excluir-perfil-btn').addEventListener('click', function () {
    if (existeChatPendenteOuEmAndamento()) {
      mostrarFeedback('Você só pode excluir sua conta quando não houver chats em andamento ou ainda não finalizados.', 'error');
      return;
    }

    const confirmar = window.confirm('Tem certeza que deseja excluir o perfil? Esta ação vai limpar os dados salvos localmente neste navegador.');
    if (!confirmar) return;

    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(PASSWORD_KEY);
    localStorage.removeItem('tipoUsuarioLogado');
    localStorage.removeItem('clienteLocalBusca');
    window.location.href = 'index.html';
  });
})();</script>

</body>
</html>
