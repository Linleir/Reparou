<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamentos Lojista - Reparou</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Test.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="container py-3">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <!-- HEADER -->
            <header class="black-header text-center p-3 mb-3">
                <h4 class="m-0 fw-bold">Agendamentos</h4>
            </header>

            <!-- CONTEÚDO -->
            <div class="card mb-3">
                <div class="card-body">

                    <!-- FILTROS -->
                    <div class="d-flex overflow-auto gap-2 mb-4" id="filtros-agendamento">
                        <button class="btn btn-outline-dark btn-sm active grey-pill" data-filtro="todos" onclick="filtrarAgendamentos('todos')">Todos</button>
                        <button class="btn btn-outline-dark btn-sm grey-pill" data-filtro="pendente" onclick="filtrarAgendamentos('pendente')">Pendentes</button>
                        <button class="btn btn-outline-dark btn-sm grey-pill" data-filtro="confirmado" onclick="filtrarAgendamentos('confirmado')">Confirmados</button>
                    </div>

                    <!-- LISTA -->
                    <div id="lista-agendamentos"></div>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- NAVBAR INFERIOR -->
<nav class="navbar fixed-bottom bg-dark border-top">
    <div class="container d-flex justify-content-around text-center">
        <a href="Perfil LojistaBT.html" class="text-white">
            <i class="fa-solid fa-store"></i>
        </a>
        <a href="agendamento_lojistaBT.html" class="text-white">
            <i class="fa-solid fa-calendar-check"></i>
        </a>
        <a href="chat_lojistaBT.html" class="text-white">
            <i class="fa-solid fa-comments"></i>
        </a>
    </div>
</nav>

<script src="dados.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const idLojista = localStorage.getItem('lojistaLogado');
    if (!idLojista || localStorage.getItem('tipoUsuarioLogado') !== 'lojista') {
        window.location.href = 'indexBT.html';
        return;
    }

    const lojasDoLojista = lojas.filter(l => l.lojistaId === idLojista);
    let agendamentos = [];

    if (!localStorage.getItem(`agendamentos_${idLojista}`)) {
        const nomes = ["Mariana Costa", "Carlos Silva", "João Oliveira", "Ana Pereira"];
        const servicosDemo = ["Formatação", "Troca de Tela", "Limpeza Interna", "Upgrade SSD"];
        const statusDemo = ["pendente", "confirmado", "pendente", "cancelado"];
        
        for(let i=0; i < 4; i++) {
            const lojaAleatoria = lojasDoLojista[Math.floor(Math.random() * lojasDoLojista.length)] || lojasDoLojista[0];
            agendamentos.push({
                id: `ag-${Date.now()}-${i}`,
                cliente: nomes[i],
                servico: servicosDemo[i],
                lojaNome: lojaAleatoria ? lojaAleatoria.nome : 'Loja Central',
                data: `2026-03-${20 + i}`,
                hora: `1${i}:30`,
                status: statusDemo[i]
            });
        }
        localStorage.setItem(`agendamentos_${idLojista}`, JSON.stringify(agendamentos));
    } else {
        agendamentos = JSON.parse(localStorage.getItem(`agendamentos_${idLojista}`));
    }

    window.renderizarAgendamentos = function(filtro = 'todos') {
        const container = document.getElementById('lista-agendamentos');
        container.innerHTML = '';

        const filtrados = agendamentos.filter(ag => filtro === 'todos' || ag.status === filtro);

        if (filtrados.length === 0) {
            container.innerHTML = `<div class="text-center py-4 text-muted"><p>Sem agendamentos.</p></div>`;
            return;
        }

        filtrados.sort((a, b) => new Date(a.data) - new Date(b.data)).forEach(ag => {

            let badgeClass = `status-${ag.status}`;
            let botoesHTML = '';

            if (ag.status === 'pendente') {
                botoesHTML = `
                    <button class="btn btn-dark w-100 mb-2" onclick="alterarStatus('${ag.id}', 'confirmado')">Confirmar</button>
                    <button class="btn btn-outline-dark w-100" onclick="alterarStatus('${ag.id}', 'cancelado')">Cancelar</button>
                `;
            } else if (ag.status === 'confirmado') {
                botoesHTML = `<button class="btn btn-outline-dark w-100 mt-2" onclick="alterarStatus('${ag.id}', 'cancelado')">Cancelar</button>`;
            }

            const dataFormatada = new Date(ag.data).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });

            container.innerHTML += `
                <div class="card mb-3">
                    <div class="card-body">
                        <span class="status-badge ${badgeClass}">${ag.status.toUpperCase()}</span>
                        <h6 class="fw-bold mb-1">${ag.cliente}</h6>
                        <p class="mb-1 small"><strong>Serviço:</strong> ${ag.servico}</p>
                        <p class="mb-2 small"><strong>Data:</strong> ${dataFormatada} às ${ag.hora}</p>
                        ${botoesHTML ? `<div class="mt-3">${botoesHTML}</div>` : ''}
                    </div>
                </div>
            `;
        });
    };

    window.alterarStatus = function(id, novoStatus) {
        const index = agendamentos.findIndex(ag => ag.id === id);
        if (index !== -1) {
            agendamentos[index].status = novoStatus;
            localStorage.setItem(`agendamentos_${idLojista}`, JSON.stringify(agendamentos));
            const filtroAtivo = document.querySelector('.grey-pill.active').getAttribute('data-filtro');
            renderizarAgendamentos(filtroAtivo);
        }
    };

    window.filtrarAgendamentos = function(filtro) {
        document.querySelectorAll('.grey-pill').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.grey-pill[data-filtro="${filtro}"]`).classList.add('active');
        renderizarAgendamentos(filtro);
    };

    renderizarAgendamentos('todos');
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
