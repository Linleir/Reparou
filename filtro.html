<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="mobile-screen">
        <div class="top-bar-black filter-header">
            <h2>Filtro</h2>
        </div>
        
        <div class="filter-body">
            <h3>Tipo de Computador:</h3>
            <div class="radio-group">
                <span>Desktop <span class="radio-btn"></span></span>
                <span>Notebook <span class="radio-btn"></span></span>
            </div>

            <h3>Tipo de Serviço:</h3>
            <input type="text" class="search-bar" style="background-color: var(--card-gray);" placeholder="Pesquisar">
            
            <div class="white-container" style="margin: 20px 0;">
                <div class="card" style="padding: 10px 15px;"><h3>Reparo</h3></div>
                <div class="card" style="padding: 10px 15px;"><h3>Manutenção</h3></div>
                <div class="card" style="padding: 10px 15px;"><h3>Diagnostico</h3></div>
            </div>
        </div>

        <nav class="bottom-nav">
            <i class="fa-solid fa-comment"></i>
            <i class="fa-solid fa-user"></i>
            <a href="index.html"><i class="fa-solid fa-store"></i></a>
            <i class="fa-solid fa-list"></i>
            <i class="fa-solid fa-gear"></i>
        </nav>
    </div>

</body>
</html>
