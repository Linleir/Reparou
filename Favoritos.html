<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reparou - Favoritos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .content-area.favoritos-page {
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .content-area.favoritos-page .white-window {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .content-area.favoritos-page .white-window::-webkit-scrollbar {
            display: none;
        }
    </style>

</head>
<body>
<div class="mobile-container">
    <header class="black-header">
        <a href="Perfil Usuario.html" class="back-btn" aria-label="Voltar"><i class="fa-solid fa-arrow-left"></i></a>
        <h2 class="page-title">Favoritos</h2>
    </header>

    <div class="content-area favoritos-page">
        <input type="text" class="search-input2" id="campoPesquisaFavoritos" placeholder="Pesquisar">

        <main class="white-window" id="listaFavoritos"></main>
    </div>

    <nav class="bottom-nav">
        <a href="inicio_cliente.html" class="nav-item"><img src="Casa e lupa minimalista_edited.png" class="home"></a>
        <a href="Historico_de_Avaliacao.html" class="nav-item"><img src="star.png" class="home"></a>
        <a href="Mensagems.html" class="nav-item"><img src="chat.png" class="home"></a>
    </nav>
</div>
<script src="dados.js"></script>
<script>
    const listaFavoritos = document.getElementById('listaFavoritos');
    const campoPesquisaFavoritos = document.getElementById('campoPesquisaFavoritos');

    function lojaCombinaPesquisaFavoritos(loja, textoDigitado = '') {
        const busca = normalizarTexto(textoDigitado || '');
        if (!busca) return true;
        const base = normalizarTexto(obterTermosFiltroDaLoja(loja).join(' | '));
        const termos = obterTermosPesquisa(textoDigitado || '');
        return base.includes(busca) || termos.every((termo) => base.includes(termo));
    }

    function renderizarFavoritos() {
        const favoritas = obterLojasFavoritasDetalhadas();
        const termo = (campoPesquisaFavoritos?.value || '').trim();

        if (!favoritas.length) {
            listaFavoritos.innerHTML = '<div class="chat-empty-state">Você ainda não favoritou nenhuma loja.</div>';
            return;
        }

        const favoritasFiltradas = favoritas.filter((loja) => lojaCombinaPesquisaFavoritos(loja, termo));

        if (!favoritasFiltradas.length) {
            listaFavoritos.innerHTML = '<div class="chat-empty-state">Nenhuma loja favorita encontrada.</div>';
            return;
        }

        listaFavoritos.innerHTML = favoritasFiltradas.map((loja) => criarCardLojaHtml(loja, 'favoritos')).join('');
        conectarFavoritosNoEscopo(listaFavoritos);
    }

    if (campoPesquisaFavoritos) {
        campoPesquisaFavoritos.addEventListener('input', renderizarFavoritos);
    }

    document.addEventListener('favoritosAtualizados', renderizarFavoritos);
    renderizarFavoritos();
</script>
</body>
</html>
