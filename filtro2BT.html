<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reparou - Filtro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS compatível -->
    <link rel="stylesheet" href="custom.css">
</head>

<body>

<div class="container py-3">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <!-- HEADER -->
            <div class="bg-dark text-white text-center py-3 mb-3 rounded-bottom">
                <h5 class="mb-0">Filtro</h5>
            </div>

            <!-- CONTEÚDO -->
            <div class="p-3 mb-5">

                <!-- TIPO DE COMPUTADOR -->
                <h5 class="mb-3">Tipo de Computador:</h5>

                <div class="d-flex align-items-center gap-3 mb-4">

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="tipo" id="desktop">
                        <label class="form-check-label" for="desktop">
                            Desktop
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="tipo" id="notebook">
                        <label class="form-check-label" for="notebook">
                            Notebook
                        </label>
                    </div>

                </div>

                <!-- TIPO DE SERVIÇO -->
                <h5 class="mb-3">Tipo de Serviço:</h5>

                <!-- INPUT -->
                <input type="text"
                       class="form-control mb-4"
                       placeholder="Pesquisar">

                <!-- LISTA -->
                <div class="card p-3">

                    <div class="list-group">

                        <button class="list-group-item list-group-item-action">
                            Reparo
                        </button>

                        <button class="list-group-item list-group-item-action">
                            Manutenção
                        </button>

                        <button class="list-group-item list-group-item-action">
                            Diagnóstico
                        </button>

                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<!-- NAVBAR INFERIOR -->

    </div>
</nav>

</body>
</html>
